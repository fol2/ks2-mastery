version = 1
name = "ks2-mastery"

[setup]
script = '''
set -eu

worktree_path="${CODEX_WORKTREE_PATH:-$PWD}"
source_tree_path="${CODEX_SOURCE_TREE_PATH:-}"

cd "$worktree_path"

if [ -n "$source_tree_path" ] && [ -f "$source_tree_path/.env" ] && [ ! -f ".env" ]; then
  cp "$source_tree_path/.env" ".env"
  chmod 600 ".env" || true
fi

# Symlink node_modules from primary checkout when package files are identical,
# falling back to a full npm install only when they diverge.
node scripts/worktree-setup.mjs
'''

[[actions]]
name = "Test"
icon = "test"
command = "node ./scripts/codex-env-run.mjs -- npm test"

[[actions]]
name = "Check"
icon = "tool"
command = "node ./scripts/codex-env-run.mjs -- npm run check"

[[actions]]
name = "Verify"
icon = "test"
command = "node ./scripts/codex-env-run.mjs -- npm run verify"

[[actions]]
name = "Build"
icon = "run"
command = "node ./scripts/codex-env-run.mjs -- npm run build"
