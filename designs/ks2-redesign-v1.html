<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>KS2 Mastery — Redesign v1 (Codex Journal)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800;900&display=swap" />

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('ks2.design.theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      } catch (err) {}
    })();
  </script>

  <style>
    /* ==========================================================
       Token system (mirrors /styles/app.css, do not drift)
       ========================================================== */
    :root {
      color-scheme: light dark;

      --bg: #F6F5F1;
      --bg-tint: #EFEADD;
      --panel: #FFFFFF;
      --panel-soft: #FAF9F4;
      --panel-sunken: #F1ECDE;

      --ink: #1D2B3A;
      --ink-2: #3B4A5C;
      --muted: #7A8697;
      --subtle: #A9B1BD;

      --line: #E5E1D6;
      --line-soft: #EFEBE0;
      --line-strong: #CFC8B6;

      --good: #2F9E6A;
      --good-strong: #1F7A4F;
      --good-soft: #E4F5EC;
      --warn: #D08A2C;
      --warn-strong: #9E6A19;
      --warn-soft: #FBEFD9;
      --bad: #D25757;
      --bad-strong: #B03838;
      --bad-soft: #FCE5E3;

      --brand: #3E6FA8;
      --brand-ink: #274D79;
      --brand-soft: #DCE6F3;

      --inklet: #3E6FA8;
      --inklet-soft: #E8F0FA;
      --glimmer: #B43CD9;
      --glimmer-soft: #F8E7F1;
      --phaeton: #D08A2C;
      --phaeton-soft: #F6EED7;

      --radius-xs: 8px;
      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 28px;
      --radius-xl: 32px;

      --shadow-xs: 0 1px 2px rgba(29,43,58,0.06);
      --shadow: 0 1px 2px rgba(29,43,58,0.04), 0 8px 24px rgba(29,43,58,0.06);
      --shadow-lg: 0 2px 4px rgba(29,43,58,0.05), 0 16px 40px rgba(29,43,58,0.10);
      --shadow-glow: 0 0 0 4px rgba(62,111,168,0.18);
      --shadow-warm: 0 24px 48px -24px rgba(176, 132, 66, 0.35);

      --font-display: "Fraunces", Georgia, "Iowan Old Style", serif;
      --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-serif: "Fraunces", Georgia, serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --dur-fast: 120ms;
      --dur: 200ms;
      --dur-slow: 320ms;
      --dur-slower: 520ms;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0F1620;
        --bg-tint: #131C29;
        --panel: #18212F;
        --panel-soft: #1E2837;
        --panel-sunken: #14202F;

        --ink: #F3EEE0;
        --ink-2: #D4D9E3;
        --muted: #8B95A6;
        --subtle: #5F6A7C;

        --line: #2A3444;
        --line-soft: #212A39;
        --line-strong: #3D4A60;

        --good: #57C48B;
        --good-strong: #8AD7AE;
        --good-soft: color-mix(in oklab, #2F9E6A 22%, #0F1620);
        --warn: #E2A756;
        --warn-strong: #F1C081;
        --warn-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);
        --bad: #E87E7E;
        --bad-strong: #F6A7A7;
        --bad-soft: color-mix(in oklab, #D25757 22%, #0F1620);

        --brand: #6E9ED6;
        --brand-ink: #A7C2E4;
        --brand-soft: color-mix(in oklab, #3E6FA8 26%, #0F1620);

        --inklet: #6E9ED6;
        --inklet-soft: color-mix(in oklab, #3E6FA8 24%, #0F1620);
        --glimmer: #D289EA;
        --glimmer-soft: color-mix(in oklab, #B43CD9 22%, #0F1620);
        --phaeton: #E2A756;
        --phaeton-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);

        --shadow-xs: 0 1px 2px rgba(0,0,0,0.35);
        --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 12px 28px rgba(0,0,0,0.35);
        --shadow-lg: 0 2px 4px rgba(0,0,0,0.4), 0 24px 48px rgba(0,0,0,0.5);
        --shadow-glow: 0 0 0 4px rgba(110,158,214,0.26);
        --shadow-warm: 0 32px 60px -28px rgba(0,0,0,0.6);
      }
    }

    :root[data-theme="dark"] {
      --bg: #0F1620;
      --bg-tint: #131C29;
      --panel: #18212F;
      --panel-soft: #1E2837;
      --panel-sunken: #14202F;
      --ink: #F3EEE0;
      --ink-2: #D4D9E3;
      --muted: #8B95A6;
      --subtle: #5F6A7C;
      --line: #2A3444;
      --line-soft: #212A39;
      --line-strong: #3D4A60;
      --good: #57C48B;
      --good-strong: #8AD7AE;
      --good-soft: color-mix(in oklab, #2F9E6A 22%, #0F1620);
      --warn: #E2A756;
      --warn-strong: #F1C081;
      --warn-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);
      --bad: #E87E7E;
      --bad-strong: #F6A7A7;
      --bad-soft: color-mix(in oklab, #D25757 22%, #0F1620);
      --brand: #6E9ED6;
      --brand-ink: #A7C2E4;
      --brand-soft: color-mix(in oklab, #3E6FA8 26%, #0F1620);
      --inklet: #6E9ED6;
      --inklet-soft: color-mix(in oklab, #3E6FA8 24%, #0F1620);
      --glimmer: #D289EA;
      --glimmer-soft: color-mix(in oklab, #B43CD9 22%, #0F1620);
      --phaeton: #E2A756;
      --phaeton-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.35);
      --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 12px 28px rgba(0,0,0,0.35);
      --shadow-lg: 0 2px 4px rgba(0,0,0,0.4), 0 24px 48px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 0 4px rgba(110,158,214,0.26);
      --shadow-warm: 0 32px 60px -28px rgba(0,0,0,0.6);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    /* ==========================================================
       Base / reset
       ========================================================== */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(1100px 700px at 82% -12%, var(--bg-tint), transparent 60%),
        radial-gradient(1000px 560px at -8% 96%, var(--bg-tint), transparent 55%),
        var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.5;
      text-wrap: pretty;
    }
    button, input, select, textarea { font: inherit; }
    a { color: inherit; }
    ::selection { background: color-mix(in oklab, var(--brand) 28%, transparent); color: inherit; }

    /* ==========================================================
       Design shell (critique view — not part of product)
       ========================================================== */
    .design-shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .design-rail {
      border-right: 1px solid var(--line);
      background: color-mix(in oklab, var(--panel-soft) 96%, transparent);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .design-rail h2 {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      margin: 0 0 2px;
    }
    .design-rail .eyebrow { font-size: 10px; margin-bottom: 10px; }
    .design-rail .rail-group {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin: 14px 6px 6px;
    }
    .rail-item {
      appearance: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink-2);
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      font-family: inherit;
      transition: background var(--dur) var(--ease-out), color var(--dur) var(--ease-out);
    }
    .rail-item:hover { background: var(--panel-sunken); }
    .rail-item.active {
      background: var(--panel);
      border-color: var(--line);
      color: var(--ink);
      box-shadow: var(--shadow-xs);
    }
    .rail-item .dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--subtle);
    }
    .rail-item.active .dot { background: var(--brand); }

    .design-canvas {
      min-height: 100vh;
      padding: 24px 24px 60px;
    }
    .design-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tool-chip-row { display: inline-flex; gap: 6px; align-items: center; }
    .tool-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .seg {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
      background: var(--panel-soft);
      gap: 2px;
    }
    .seg button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--ink-2);
    }
    .seg button.on {
      background: var(--panel);
      color: var(--ink);
      box-shadow: var(--shadow-xs);
    }

    /* Device frame */
    .device-frame {
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: max-width var(--dur-slow) var(--ease-out);
    }
    .device-frame.desktop { max-width: 1240px; }
    .device-frame.mobile { max-width: 390px; border-radius: 40px; padding: 8px; background: #2B2B2B; }
    .device-frame.mobile .device-inner {
      border-radius: 32px;
      overflow: hidden;
      background: var(--bg);
    }
    .device-frame.desktop .device-inner { background: var(--bg); }
    .device-inner { min-height: 700px; position: relative; }

    /* ==========================================================
       App-level shared primitives (mirrors real app)
       ========================================================== */
    .app-shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
    }
    .app-shell.mobile { padding: 16px; }

    /* Session variant: lays a borderless hero-region background behind the
       whole shell so the question card can float over its current region
       scenery, echoing the hero treatment on Home / Setup. */
    .app-shell.in-session {
      position: relative;
      isolation: isolate;
      /* Clip the bleeding ::before so the hero art can extend past the shell
         padding without leaking into surrounding chrome. */
      overflow: hidden;
    }
    .app-shell.in-session::before {
      content: "";
      position: absolute;
      /* Negative inset cancels the 24px app-shell padding (16px on mobile) —
         hero art bleeds edge-to-edge with no cream gutter. */
      inset: -24px;
      background:
        linear-gradient(180deg,
          color-mix(in oklab, var(--panel) 48%, transparent) 0%,
          color-mix(in oklab, var(--panel) 24%, transparent) 42%,
          color-mix(in oklab, var(--panel) 52%, transparent) 100%),
        var(--hero-bg, none) center 42% / cover no-repeat;
      z-index: -1;
      pointer-events: none;
    }
    .app-shell.in-session.mobile::before { inset: -16px; }
    /* Tighter, higher-contrast ink on the session scene so the prompt reads
       clearly over the variable region backgrounds. */
    .app-shell.in-session .prompt-instr { color: color-mix(in oklab, var(--ink) 85%, black); }
    .app-shell.in-session .cloze,
    .app-shell.in-session .word-input {
      color: color-mix(in oklab, var(--ink) 92%, black);
    }
    .app-shell.in-session .word-input::placeholder {
      color: color-mix(in oklab, var(--ink) 55%, transparent);
    }
    /* --on-hero* tokens drive any chrome that sits directly on the region
       art. Default = dark ink for light/mid-light regions; flipped to warm
       paper when the runtime luminance probe adds `.hero-dark`. */
    .app-shell.in-session {
      --on-hero: color-mix(in oklab, var(--ink) 88%, black);
      --on-hero-muted: color-mix(in oklab, var(--ink) 70%, black);
      --on-hero-chip-bg: color-mix(in oklab, var(--panel) 90%, transparent);
      --on-hero-chip-border: color-mix(in oklab, var(--line-strong) 80%, var(--ink));
      --on-hero-chip-ink: color-mix(in oklab, var(--ink) 92%, black);
    }
    .app-shell.in-session.hero-dark {
      --on-hero: #f4ecd8;
      --on-hero-muted: color-mix(in oklab, #f4ecd8 75%, transparent);
      --on-hero-chip-bg: color-mix(in oklab, black 55%, transparent);
      --on-hero-chip-border: color-mix(in oklab, white 28%, transparent);
      --on-hero-chip-ink: #fdfaf1;
    }
    .app-shell.in-session .keys-hint { color: var(--on-hero-muted); }
    .app-shell.in-session .keys-hint kbd {
      background: var(--on-hero-chip-bg);
      border-color: var(--on-hero-chip-border);
      color: var(--on-hero-chip-ink);
    }
    .app-shell.in-session .btn.sm.bad {
      background: color-mix(in oklab, var(--bad-soft) 85%, var(--panel));
      color: var(--bad-strong);
      border-color: color-mix(in oklab, var(--bad) 45%, var(--ink));
    }
    .app-shell.in-session.hero-dark .btn.sm.bad {
      /* Darker region needs a more opaque chip so the pink button can still
         visually sit on top — pick up the bad hue against a near-black base. */
      background: color-mix(in oklab, var(--bad-soft) 30%, rgba(0,0,0,0.55));
      color: #ffdcd7;
      border-color: color-mix(in oklab, var(--bad) 55%, white);
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      padding: 10px 16px;
      font-weight: 800;
      font-size: 0.95rem;
      transition: transform 0.05s ease, filter 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { filter: brightness(0.98); }
    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn.primary { background: var(--brand); color: white; }
    .btn.primary:hover { background: var(--brand-ink); }
    .btn.secondary { background: var(--panel-soft); border-color: var(--line); color: var(--ink); }
    .btn.ghost { background: transparent; border-color: var(--line); color: var(--ink); }
    .btn.good { background: var(--good); color: white; }
    .btn.bad { background: transparent; color: var(--bad); border-color: var(--bad-soft); }
    .btn.lg { padding: 14px 22px; font-size: 1.02rem; }
    .btn.xl { padding: 16px 26px; font-size: 1.08rem; border-radius: 999px; }
    .btn.sm { padding: 7px 12px; font-size: 0.85rem; }
    .btn.icon {
      width: 42px; height: 42px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--panel-soft); border-color: var(--line); color: var(--ink);
    }
    .btn.icon.lg { width: 52px; height: 52px; }
    /* Audio buttons glow while their clip is playing so the learner can see at
       a glance which rate (normal / slow) is in flight. */
    .btn.icon.playing {
      background: color-mix(in oklab, var(--brand) 14%, var(--panel));
      border-color: color-mix(in oklab, var(--brand) 45%, var(--line));
      color: var(--brand-ink);
      animation: audio-glow 1.4s var(--ease-in-out) infinite;
    }
    @keyframes audio-glow {
      0%, 100% {
        box-shadow:
          0 0 0 3px color-mix(in oklab, var(--brand) 20%, transparent),
          0 6px 18px color-mix(in oklab, var(--brand) 22%, transparent);
      }
      50% {
        box-shadow:
          0 0 0 8px color-mix(in oklab, var(--brand) 8%, transparent),
          0 10px 26px color-mix(in oklab, var(--brand) 30%, transparent);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .btn.icon.playing { animation: none; }
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--ink-2);
    }
    .chip.good { background: var(--good-soft); color: var(--good-strong); border-color: color-mix(in oklab, var(--good) 30%, transparent); }
    .chip.warn { background: var(--warn-soft); color: var(--warn-strong); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
    .chip.bad { background: var(--bad-soft); color: var(--bad-strong); border-color: color-mix(in oklab, var(--bad) 30%, transparent); }
    .chip.brand { background: var(--brand-soft); color: var(--brand-ink); border-color: color-mix(in oklab, var(--brand) 30%, transparent); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .card.soft { background: var(--panel-soft); }
    .card.sunken { background: var(--panel-sunken); }

    .eyebrow {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .title-xl {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(2.2rem, 4.2vw, 3.4rem);
      line-height: 1.0;
      letter-spacing: -0.025em;
      font-weight: 500;
    }
    .title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(1.7rem, 2.6vw, 2.3rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 500;
    }
    .section-title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      font-weight: 500;
    }
    .lede {
      margin: 10px 0 0;
      color: var(--ink-2);
      line-height: 1.5;
      font-size: 1.02rem;
      max-width: 58ch;
    }
    .muted { color: var(--muted); }
    .small { font-size: 0.88rem; }

    /* ==========================================================
       NEW: Hero (landing)
       ========================================================== */
    .hero-paper {
      position: relative;
      border-radius: var(--radius-lg);
      padding: 40px 36px 32px;
      overflow: hidden;
      min-height: 380px;
      background:
        radial-gradient(140% 100% at 100% 0%, color-mix(in oklab, var(--inklet) 18%, transparent), transparent 60%),
        radial-gradient(120% 100% at 0% 100%, color-mix(in oklab, var(--phaeton) 14%, transparent), transparent 60%),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-warm);
    }
    .hero-paper::before, .hero-paper::after {
      content: "";
      position: absolute;
      left: 32px; right: 32px;
      height: 1px;
      background: color-mix(in oklab, var(--line-strong) 60%, transparent);
      z-index: 1;
    }
    .hero-paper::before { top: 22px; }
    .hero-paper::after { bottom: 22px; }

    /* Region art layer — a randomised regional background softened with a
       panel-colour wash so the left-side text stays legible in both themes. */
    .hero-art {
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: inherit;
      background: var(--hero-bg, none) center 42% / cover no-repeat;
      pointer-events: none;
      overflow: hidden;
    }
    .hero-art::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          100deg,
          color-mix(in oklab, var(--panel) 88%, transparent) 0%,
          color-mix(in oklab, var(--panel) 66%, transparent) 32%,
          color-mix(in oklab, var(--panel) 28%, transparent) 62%,
          color-mix(in oklab, var(--panel) 10%, transparent) 100%
        ),
        linear-gradient(
          180deg,
          color-mix(in oklab, var(--panel) 20%, transparent),
          transparent 38%,
          transparent 72%,
          color-mix(in oklab, var(--panel) 26%, transparent)
        );
      pointer-events: none;
    }

    /* Hero text sits above the roaming monsters (z:0). Capped width
       keeps the right side clear so companions have room to drift. */
    .hero-mission {
      position: relative;
      z-index: 2;
      max-width: 58%;
    }
    .hero-mission .greet {
      font-family: var(--font-serif);
      font-size: 0.98rem;
      color: var(--ink-2);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .hero-mission .greet b { font-weight: 700; color: var(--ink); }
    .hero-mission .mission {
      font-family: var(--font-serif);
      font-size: clamp(2.1rem, 4.2vw, 3.1rem);
      line-height: 1.02;
      letter-spacing: -0.025em;
      font-weight: 500;
      margin: 4px 0 0;
      color: var(--ink);
    }
    .hero-mission .mission em {
      font-style: italic;
      color: var(--brand);
    }
    .hero-mission .hero-cta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; align-items: center; }
    .hero-mission .hero-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; }

    .companion-stage {
      position: relative;
      height: 260px;
      border-radius: var(--radius-lg);
      background:
        radial-gradient(closest-side, color-mix(in oklab, var(--inklet) 26%, transparent), transparent 70%),
        var(--panel-soft);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .companion-stage::after {
      content: "";
      position: absolute;
      left: 14%; right: 14%;
      bottom: 14%;
      height: 12px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(29,43,58,0.28), transparent 70%);
      filter: blur(2px);
    }
    .companion-stage.small { height: 120px; }
    .companion-stage.petite { height: 84px; border-radius: var(--radius); }
    .companion-img {
      position: relative;
      width: 200px;
      height: auto;
      animation: companion-float 5.4s ease-in-out infinite;
      filter: drop-shadow(0 14px 20px rgba(0,0,0,0.18));
    }
    .companion-img.small { width: 96px; }
    .companion-img.petite { width: 60px; }
    .companion-img.bounce { animation: companion-bounce 500ms var(--ease-out) 1; }
    @keyframes companion-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes companion-bounce {
      0% { transform: translateY(0) scale(1); }
      30% { transform: translateY(-14px) scale(1.04); }
      60% { transform: translateY(0) scale(0.98); }
      100% { transform: translateY(0) scale(1); }
    }

    /* ==========================================================
       NEW: Monster meadow (hero background layer)
       Caught monsters roam the entire hero paper. The meadow is
       an absolute overlay that shares space with the hero text;
       text sits above via z-index, monsters drift behind.
       Three path keyframes give variety: walk (ground), fly-a
       (looping), fly-b (drifty). Outer wraps translate + flip;
       inner <img> handles the idle bob so transforms don't clash.
       ========================================================== */
    .monster-meadow {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      border-radius: var(--radius-lg);
    }
    .monster-meadow.empty {
      display: flex; align-items: center; justify-content: center;
    }
    .monster-meadow .meadow-empty-note {
      font-family: var(--font-serif);
      color: var(--ink-3);
      font-size: 0.96rem;
      padding: 0 24px;
      text-align: center;
    }
    .meadow-monster {
      position: absolute;
      left: var(--left, 50%);
      top: var(--top, 50%);
      width: var(--size, 64px);
      height: var(--size, 64px);
      animation-duration: var(--dur, 18s);
      animation-delay: var(--delay, 0s);
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
      will-change: transform;
      pointer-events: none;
    }
    .meadow-monster[data-path="walk"]  { animation-name: meadow-walk;  }
    .meadow-monster[data-path="fly-a"] { animation-name: meadow-fly-a; }
    .meadow-monster[data-path="fly-b"] { animation-name: meadow-fly-b; }
    /* Eggs (stage 0) sit still in the middle-lower band and never wander;
       we also mute the idle bob on their <img> child. */
    .meadow-monster.egg,
    .meadow-monster.egg img { animation: none; }
    .meadow-monster img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: meadow-bob 3.4s ease-in-out infinite;
      animation-delay: var(--bob-delay, 0s);
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.12));
    }
    /* Ground shadow — ellipse anchored below each monster. Walkers get
       a denser shadow (feet planted); flyers get a fainter, smaller one
       so they still feel airborne when they drift over it. */
    .meadow-shadow {
      position: absolute;
      left: 12%; right: 12%;
      bottom: -4px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(29,43,58,0.32), rgba(29,43,58,0.10) 55%, transparent 75%);
      filter: blur(4px);
      pointer-events: none;
      z-index: 0;
    }
    .meadow-monster[data-path="fly-a"] .meadow-shadow,
    .meadow-monster[data-path="fly-b"] .meadow-shadow {
      left: 22%; right: 22%;
      bottom: -8px;
      height: 10px;
      background: radial-gradient(ellipse at center, rgba(29,43,58,0.18), transparent 70%);
      filter: blur(5px);
      opacity: 0.75;
    }
    [data-theme="dark"] .meadow-shadow {
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), rgba(0,0,0,0.20) 55%, transparent 75%);
    }
    [data-theme="dark"] .meadow-monster[data-path="fly-a"] .meadow-shadow,
    [data-theme="dark"] .meadow-monster[data-path="fly-b"] .meadow-shadow {
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.32), transparent 70%);
    }

    /* Flip cadence: the ~1% window around each scaleX sign change
       becomes a quick spin (roughly 0.1–0.25s depending on duration),
       short enough that the squish through scaleX(0) reads as a turn,
       not a squash. The outer segments keep the default ease-in-out.
       `--face` (1 for right-drawn sprites, -1 for left-drawn ones) flips
       every X translation and rotation sign so the character always moves
       in the direction its face is drawn pointing. scaleX cycles the same
       way regardless: when flipped, direction naturally reverses too. */
    /* walk — ground creature, horizontal only, flips around. */
    @keyframes meadow-walk {
      0%    { transform: translate(0, 0) scaleX(1); }
      24%   { transform: translate(calc(var(--face, 1) *  58px), 0) scaleX(1); }
      25%   { transform: translate(calc(var(--face, 1) *  58px), 0) scaleX(-1); }
      74%   { transform: translate(calc(var(--face, 1) * -38px), 0) scaleX(-1); }
      75%   { transform: translate(calc(var(--face, 1) * -38px), 0) scaleX(1); }
      100%  { transform: translate(0, 0) scaleX(1); }
    }
    /* fly-a — wide loop, gentle bank. */
    @keyframes meadow-fly-a {
      0%    { transform: translate(0, 0) rotate(0deg) scaleX(1); }
      29%   { transform: translate(calc(var(--face, 1) *  92px), 2px)  rotate(calc(var(--face, 1) * -2deg)) scaleX(1); }
      30%   { transform: translate(calc(var(--face, 1) *  92px), 2px)  rotate(calc(var(--face, 1) * -2deg)) scaleX(-1); }
      70%   { transform: translate(calc(var(--face, 1) * -40px), 16px) rotate(calc(var(--face, 1) *  3deg)) scaleX(-1); }
      71%   { transform: translate(calc(var(--face, 1) * -40px), 16px) rotate(calc(var(--face, 1) *  3deg)) scaleX(1); }
      100%  { transform: translate(0, 0) rotate(0deg) scaleX(1); }
    }
    /* fly-b — drifty counter-loop, wider X. */
    @keyframes meadow-fly-b {
      0%    { transform: translate(0, 0) rotate(0deg) scaleX(1); }
      8%    { transform: translate(calc(var(--face, 1) * -20px), -6px) rotate(calc(var(--face, 1) * -1deg)) scaleX(1); }
      9%    { transform: translate(calc(var(--face, 1) * -20px), -6px) rotate(calc(var(--face, 1) * -1deg)) scaleX(-1); }
      60%   { transform: translate(calc(var(--face, 1) * -96px), 26px) rotate(calc(var(--face, 1) * -2deg)) scaleX(-1); }
      61%   { transform: translate(calc(var(--face, 1) * -96px), 26px) rotate(calc(var(--face, 1) * -2deg)) scaleX(1); }
      100%  { transform: translate(0, 0) rotate(0deg) scaleX(1); }
    }
    @keyframes meadow-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .meadow-monster,
      .meadow-monster img { animation: none; }
    }

    /* ==========================================================
       NEW: Codex rail (home)
       ========================================================== */
    .codex-rail {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .codex-tile {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background:
        linear-gradient(180deg, var(--panel) 0%, color-mix(in oklab, var(--panel-soft) 55%, var(--panel)) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out), border-color var(--dur) var(--ease-out);
    }
    .codex-tile:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: color-mix(in oklab, var(--brand) 22%, var(--line));
    }
    .codex-tile .cx-portrait {
      width: 50px; height: 50px; border-radius: 14px;
      display: grid; place-items: center;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--ink) 6%, transparent);
    }
    .codex-tile .cx-portrait img { width: 44px; height: auto; }
    .codex-tile .cx-info { min-width: 0; }
    .codex-tile .cx-name {
      font-family: var(--font-serif);
      font-size: 1rem;
      letter-spacing: -0.01em;
      font-weight: 500;
      line-height: 1.15;
      color: var(--ink);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .codex-tile .cx-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .codex-tile.locked { background: var(--panel-soft); }
    .codex-tile.locked .cx-portrait img { filter: grayscale(0.55) brightness(0.96); }
    .codex-tile.locked .cx-name { color: var(--ink-2); }

    /* Ring — big enough to hold the percentage inside */
    .cx-ring {
      --p: 40;
      --ring-color: var(--brand);
      position: relative;
      width: 40px; height: 40px;
      border-radius: 999px;
      background: conic-gradient(var(--ring-color) calc(var(--p) * 1%), var(--line-soft) 0);
      flex-shrink: 0;
    }
    .cx-ring::before {
      content: "";
      position: absolute; inset: 4px;
      background: var(--panel);
      border-radius: 999px;
    }
    .cx-ring .cx-pct {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      font-family: var(--font-serif);
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .codex-tile.locked .cx-ring .cx-pct { color: var(--ink-2); }

    /* Legacy small ring kept for any other callers */
    .ring {
      --p: 40;
      width: 20px; height: 20px;
      border-radius: 999px;
      background: conic-gradient(var(--inklet) calc(var(--p) * 1%), var(--line-soft) 0);
      position: relative;
    }
    .ring::after {
      content: "";
      position: absolute; inset: 3px;
      background: var(--panel);
      border-radius: 999px;
    }

    /* ==========================================================
       NEW: Subject cards
       ========================================================== */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }
    .subject-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      color: var(--ink);
      padding: 0;
      margin: 0;
      overflow: hidden;
      box-shadow: var(--shadow-xs);
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
    }
    .subject-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .subject-card .sc-banner {
      height: 132px;
      position: relative;
      display: flex; justify-content: flex-end; align-items: flex-start;
      padding: 14px 16px;
      overflow: hidden;
    }
    .subject-card .sc-banner::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(130% 70% at 88% 10%, rgba(255,255,255,0.30), transparent 62%);
      pointer-events: none;
    }
    /* Banner with region artwork: image fills the full banner, no gradient highlight overlay. */
    .subject-card .sc-banner--art { padding: 0; }
    .subject-card .sc-banner--art::after { display: none; }
    .subject-card .sc-banner-art {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 38%;
      display: block;
    }
    /* Soft bottom fade so body text keeps enough contrast even with dark art. */
    .subject-card .sc-banner--art .sc-banner-fade {
      position: absolute; left: 0; right: 0; bottom: 0; height: 38%;
      background: linear-gradient(to bottom, transparent, color-mix(in oklab, var(--panel) 72%, transparent));
      pointer-events: none;
    }
    /* Art cards bleed edge-to-edge: make the in-flow border transparent (preserves layout parity with other cards) and paint the visible 1px outline via box-shadow just outside the border-box. */
    .subject-card:has(.sc-banner--art) {
      border-color: transparent;
      box-shadow: 0 0 0 1px var(--line), var(--shadow-xs);
    }
    .subject-card:has(.sc-banner--art):hover {
      box-shadow: 0 0 0 1px var(--line), var(--shadow);
    }
    .subject-card .sc-glyph {
      position: absolute;
      left: 18px;
      bottom: -10px;
      font-family: var(--font-serif);
      font-size: 4.2rem;
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 0 rgba(0,0,0,0.08);
      pointer-events: none;
    }
    .subject-card .sc-status {
      position: relative;
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      padding: 4px 10px; border-radius: 999px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
      z-index: 1;
    }
    .subject-card .sc-body {
      padding: 18px 20px 20px;
      display: flex; flex-direction: column;
      flex: 1;
    }
    .subject-card .sc-eyebrow {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      min-height: calc(0.72rem * 1.2);
    }
    .subject-card h3 {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      letter-spacing: -0.015em;
      font-weight: 500;
      margin: 0;
    }
    .subject-card p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }
    .subject-card .sc-meter {
      margin-top: auto;
      padding-top: 16px;
      display: grid;
      gap: 8px;
    }
    .subject-card .sc-meter-head {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
    }
    .subject-card .sc-pct {
      font-family: var(--font-serif);
      font-size: 1.02rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .subject-card .sc-meta {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-align: right;
    }
    .progress {
      height: 10px; background: var(--line-soft); border-radius: 999px; overflow: hidden;
    }
    .progress > span {
      display: block; height: 100%; border-radius: 999px;
      transition: width var(--dur-slow) var(--ease-out);
    }

    .subject-card.placeholder .sc-banner { filter: saturate(0.35) brightness(0.99); }
    .subject-card.placeholder .sc-glyph  { color: rgba(255,255,255,0.62); }
    .subject-card.placeholder .sc-pct    { color: var(--ink-2); }

    /* ==========================================================
       NEW: Spelling setup
       ========================================================== */
    .setup-grid {
      display: grid;
      grid-template-columns: 1.65fr 1fr;
      gap: 22px;
      align-items: start;
    }
    .setup-main {
      padding: 28px 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow-warm);
      position: relative;
      overflow: hidden;
    }
    .setup-main::before {
      content: "";
      position: absolute;
      left: 24px; right: 24px; top: 14px;
      height: 1px;
      background: color-mix(in oklab, var(--line-strong) 60%, transparent);
      z-index: 2;
    }
    /* Region art sits at the back; content sits above. */
    .setup-main > .hero-art { z-index: 0; }
    .setup-content { position: relative; z-index: 1; }
    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 20px 0 0;
    }
    .mode-card {
      position: relative;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 18px 16px 18px;
      cursor: pointer;
      text-align: left;
      transition: transform var(--dur) var(--ease-out), border-color var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
    }
    .mode-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .mode-card.selected {
      border-color: var(--brand);
      background: linear-gradient(180deg, color-mix(in oklab, var(--brand-soft) 55%, var(--panel)) 0%, var(--panel) 70%);
      box-shadow: var(--shadow);
    }
    .mode-card .mc-icon {
      width: 42px; height: 42px; border-radius: 14px;
      background: var(--panel-sunken);
      display: grid; place-items: center;
      margin-bottom: 10px;
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 500;
    }
    .mode-card.selected .mc-icon { background: var(--brand); color: white; }
    .mode-card h4 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 1.08rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--ink);
    }
    .mode-card.selected h4 { color: var(--brand-ink); font-weight: 600; }
    .mode-card.selected p  { color: var(--ink-2); }
    .mode-card p { margin: 4px 0 0; color: var(--muted); font-size: 0.87rem; line-height: 1.4; }
    .mode-card .mc-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px; border-radius: 999px;
      background: var(--good-soft); color: var(--good-strong);
    }

    .tweak-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 18px 0 2px;
      border-top: 1px dashed var(--line);
      margin-top: 20px;
    }
    /* Adjacent rows share a single divider: the second row drops
       the border and tightens spacing so Options reads as a
       continuation of the same control cluster. */
    .tweak-row + .tweak-row {
      border-top: 0;
      padding-top: 4px;
      margin-top: 6px;
    }
    .toggle-chip {
      appearance: none; border: 1px solid var(--line); background: var(--panel-soft);
      padding: 7px 12px; border-radius: 999px; font-weight: 700; font-size: 0.84rem;
      color: var(--ink-2); cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .toggle-chip .box {
      width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--line-strong);
      background: var(--panel);
      display: inline-grid; place-items: center;
    }
    .toggle-chip.on { background: var(--brand-soft); color: var(--brand-ink); border-color: color-mix(in oklab, var(--brand) 30%, transparent); }
    .toggle-chip.on .box { background: var(--brand); border-color: var(--brand); color: white; }
    .toggle-chip .box svg { display: block; }

    .stepper {
      display: inline-flex; align-items: center; gap: 0;
      border: 1px solid var(--line); border-radius: 999px; background: var(--panel-soft);
      padding: 2px;
    }
    .stepper button {
      appearance: none; background: transparent; border: 0;
      width: 30px; height: 30px; border-radius: 999px;
      cursor: pointer; color: var(--ink-2); font-size: 1.2rem; font-weight: 700;
    }
    .stepper button:hover { background: var(--panel); }
    .stepper .val {
      min-width: 40px; text-align: center;
      font-weight: 800; font-size: 0.95rem;
      color: var(--ink);
    }
    .stepper .val em { font-style: normal; color: var(--muted); font-weight: 600; font-size: 0.8rem; margin-left: 2px; }

    /* LengthPicker — fixed set of round sizes (10 / 20 / 40). */
    .length-picker {
      display: inline-flex; align-items: center;
      gap: 2px;
      border: 1px solid var(--line); border-radius: 999px; background: var(--panel-soft);
      padding: 3px;
    }
    .length-option {
      appearance: none; background: transparent; border: 0;
      min-width: 42px; height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      cursor: pointer;
      color: var(--ink-2);
      font-weight: 700; font-size: 0.9rem;
      transition: background var(--dur) var(--ease-out), color var(--dur) var(--ease-out);
    }
    .length-option:hover { background: var(--panel); color: var(--ink); }
    .length-option.selected {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.12);
    }
    .length-unit {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.82rem;
      margin: 0 10px 0 6px;
    }

    /* Hero-art horizontal pan.
       background-position percentages are relative to (image-size − container-size)
       under `cover`, so 0% → 100% uses exactly the available slack — no hard-coded
       range, no blank edges. Works for any image aspect wider than the container. */
    .hero-art.pan {
      animation: hero-pan 72s ease-in-out infinite alternate;
      will-change: background-position;
    }
    @keyframes hero-pan {
      from { background-position: 0% 42%; }
      to   { background-position: 100% 42%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .hero-art.pan { animation: none; }
    }

    .setup-side .ss-card {
      padding: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-xs);
    }
    /* Where-you-stand header row: eyebrow on the left, codex jump
       on the right. Baseline-aligned so they read as one row. */
    .ss-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }
    .ss-head .eyebrow { margin: 0; }
    .ss-codex-link {
      appearance: none; background: transparent; border: 0;
      padding: 2px 0; cursor: pointer;
      color: var(--brand-ink);
      font-weight: 700; font-size: 0.82rem;
      letter-spacing: 0.01em;
    }
    .ss-codex-link:hover { text-decoration: underline; }

    /* Mini meadow — compact caught-monsters strip, same asset
       vocabulary as the hero meadow but static and evenly spaced.
       Up to three cells: missing slots simply collapse. Species
       tint drives the cell wash; `--cell-tint` falls back to the
       brand hue for any unknown species. */
    .ss-meadow {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .ss-meadow-cell {
      position: relative;
      aspect-ratio: 1 / 1;
      display: grid; place-items: center;
      /* Soft elliptical ground shadow at the bottom — anchors the monster
         visually while the img itself breathes. */
      background:
        radial-gradient(ellipse 52% 8% at 50% 82%, rgba(29,43,58,0.22) 0%, transparent 72%);
    }
    .ss-meadow-cell img {
      width: 72%; height: auto;
      filter: drop-shadow(0 4px 6px rgba(29,43,58,0.22));
      animation: ss-breathe 4.8s ease-in-out infinite;
      will-change: transform;
    }
    /* Staggered delays so the three cells don't breathe in lockstep. */
    .ss-meadow-cell:nth-child(2) img { animation-delay: 0.7s; }
    .ss-meadow-cell:nth-child(3) img { animation-delay: 1.4s; }
    .ss-meadow-cell.egg img { transform: scale(0.86); }

    @keyframes ss-breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-4px) scale(1.03); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ss-meadow-cell img { animation: none; }
    }

    .ss-meadow-empty {
      margin-top: 10px;
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      text-align: center;
    }
    .ss-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .ss-stat {
      padding: 12px 14px;
      background: var(--panel-soft);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
    }
    .ss-stat-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .ss-stat-value { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 500; margin-top: 2px; letter-spacing: -0.015em; }

    /* Word bank jump — the only action-shaped tile inside the "where you
       stand" card, sitting directly under the stat grid. Same corner radius
       and soft-panel base as .ss-stat so it reads as part of the card, but
       hover tints toward brand-soft to signal it's clickable. */
    .ss-bank-link {
      appearance: none; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--panel-soft);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      text-align: left;
      color: var(--ink);
      transition: background var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out),
                  transform var(--dur) var(--ease-out);
    }
    .ss-bank-link:hover {
      background: color-mix(in oklab, var(--brand-soft) 40%, var(--panel));
      border-color: color-mix(in oklab, var(--brand) 28%, var(--line));
    }
    .ss-bank-link:active { transform: translateY(1px); }
    .ss-bank-link-body {
      display: flex; flex-direction: column; gap: 2px; min-width: 0;
    }
    .ss-bank-link-head {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }
    .ss-bank-link-sub {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }
    .ss-bank-link-arrow {
      color: var(--brand-ink);
      font-weight: 700; font-size: 1.1rem;
      transition: transform var(--dur) var(--ease-out);
    }
    .ss-bank-link:hover .ss-bank-link-arrow { transform: translateX(3px); }
    @media (prefers-reduced-motion: reduce) {
      .ss-bank-link:hover .ss-bank-link-arrow { transform: none; }
    }

    /* ==========================================================
       Word bank — full word list slice with search + filter chips
       ========================================================== */
    .wb-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 28px 32px 24px;
      box-shadow: var(--shadow);
      max-width: 920px;
      margin: 0 auto;
    }
    .wb-head .title {
      font-family: var(--font-display);
      font-size: 1.85rem;
      letter-spacing: -0.015em;
      margin: 2px 0 6px;
    }
    .wb-head .lede {
      color: var(--ink-2);
      max-width: 60ch;
      font-size: 0.98rem;
      line-height: 1.55;
    }

    .wb-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 20px 0 14px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line-soft);
    }

    .wb-search {
      position: relative;
      flex: 1;
      min-width: 220px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      transition: border-color var(--dur) var(--ease-out),
                  box-shadow var(--dur) var(--ease-out);
    }
    .wb-search:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 24%, transparent);
    }
    .wb-search input {
      appearance: none; border: 0; outline: 0; background: transparent;
      flex: 1;
      font: inherit;
      color: var(--ink);
    }
    .wb-search input::placeholder { color: var(--subtle); }
    .wb-search-icon { color: var(--muted); font-size: 1.05rem; }

    .wb-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .wb-chip {
      appearance: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 10px 6px 12px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink-2);
      font: inherit; font-size: 0.86rem; font-weight: 600;
      transition: background var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out),
                  color var(--dur) var(--ease-out);
    }
    .wb-chip:hover {
      background: color-mix(in oklab, var(--brand-soft) 50%, var(--panel));
      border-color: color-mix(in oklab, var(--brand) 22%, var(--line));
    }
    .wb-chip.on {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--panel);
    }
    .wb-chip-count {
      display: inline-flex; justify-content: center; align-items: center;
      min-width: 22px; height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: color-mix(in oklab, var(--muted) 22%, transparent);
      color: var(--ink-2);
      font-size: 0.72rem; font-weight: 700;
      transition: background var(--dur) var(--ease-out), color var(--dur) var(--ease-out);
    }
    .wb-chip.on .wb-chip-count {
      background: color-mix(in oklab, var(--panel) 22%, transparent);
      color: var(--panel);
    }

    /* Responsive grid — packs 2–4 compact cards per row depending on the
       available canvas width. `auto-fill` + minmax keeps each card at least
       240px wide, which works out to: 4 cols at ~desktop, 3 at mid, 2 at
       narrow, and 1 on phone-sized widths. The per-card layout is a tiny
       two-row grid so the meta strip always sits under the word + action. */
    .wb-list {
      list-style: none;
      margin: 0; padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .wb-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "word   action"
        "meta   meta";
      align-items: start;
      column-gap: 10px;
      row-gap: 8px;
      padding: 12px 12px 10px 16px;
      background: var(--panel-soft);
      border: 1px solid var(--line-soft);
      border-left: 4px solid var(--line-strong);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out);
    }
    .wb-row:hover {
      background: color-mix(in oklab, var(--panel) 60%, var(--panel-soft));
      border-color: color-mix(in oklab, var(--brand) 16%, var(--line));
    }
    .wb-row:focus-visible {
      outline: 0;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 24%, transparent);
    }
    .wb-row[data-status="due"]      { border-left-color: var(--warn); }
    .wb-row[data-status="weak"]     { border-left-color: var(--bad); }
    .wb-row[data-status="learning"] { border-left-color: var(--brand); }
    .wb-row[data-status="secure"]   { border-left-color: var(--good); }
    .wb-row[data-status="unseen"]   { border-left-color: var(--subtle); }

    .wb-cell-word {
      grid-area: word;
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
      row-gap: 4px;
      min-width: 0;
      align-self: center;
    }
    .wb-word {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      color: var(--ink);
      /* Long words (parliament, correspond, literature) will break softly
         rather than overflow the 240px minimum card width. */
      overflow-wrap: anywhere;
    }

    .wb-pill {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .wb-pill.due      { background: var(--warn-soft);    color: var(--warn-strong); }
    .wb-pill.weak     { background: var(--bad-soft);     color: var(--bad-strong); }
    .wb-pill.learning { background: var(--brand-soft);   color: var(--brand-ink); }
    .wb-pill.secure   { background: var(--good-soft);    color: var(--good-strong); }
    .wb-pill.unseen   { background: var(--panel-sunken); color: var(--muted); }

    /* Compact meta strip — inline label · value pairs that wrap. Labels are
       de-emphasised so the numbers read first; the whole strip stays under
       the word heading and never blocks the action button. */
    .wb-cell-meta {
      grid-area: meta;
      display: flex; gap: 4px 12px;
      flex-wrap: wrap;
      font-size: 0.78rem;
      line-height: 1.3;
    }
    .wb-meta {
      display: inline-flex; align-items: baseline; gap: 4px;
      min-width: 0;
    }
    .wb-meta-label {
      font-size: 0.68rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      font-weight: 600;
    }
    .wb-meta-value {
      color: var(--ink);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .wb-action {
      grid-area: action;
      align-self: center;
      appearance: none; cursor: pointer;
      display: inline-flex; justify-content: center; align-items: center;
      width: 34px; height: 34px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--brand-ink);
      transition: background var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out),
                  transform var(--dur-fast) var(--ease-out);
    }
    .wb-action:hover {
      background: var(--brand-soft);
      border-color: color-mix(in oklab, var(--brand) 30%, var(--line));
      transform: translateX(2px);
    }

    .wb-empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: var(--panel-soft);
      border: 1px dashed var(--line);
      border-radius: var(--radius-sm);
      list-style: none;
    }

    .wb-foot {
      margin-top: 14px;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: right;
    }

    @media (prefers-reduced-motion: reduce) {
      .wb-row, .wb-chip, .wb-action, .wb-search { transition: none; }
      .wb-action:hover { transform: none; }
    }

    @media (max-width: 720px) {
      .wb-card { padding: 22px 20px 20px; border-radius: var(--radius); }
      /* The `auto-fill, minmax(240px, 1fr)` grid naturally collapses to a
         single column when the card canvas is narrower than ~480px, so no
         explicit row override is needed any more. */
    }

    /* ==========================================================
       Word bank — detail modal (explanation + drill)
       ========================================================== */
    .wb-modal-scrim {
      position: fixed; inset: 0;
      display: flex; justify-content: center; align-items: center;
      padding: 24px;
      background: rgba(15, 22, 32, 0.48);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      animation: wbScrimIn var(--dur) var(--ease-out);
    }
    @keyframes wbScrimIn { from { opacity: 0; } to { opacity: 1; } }

    .wb-modal {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 600px;
      max-height: calc(100vh - 48px);
      overflow: auto;
      padding: 28px 32px 22px;
      animation: wbModalIn var(--dur-slow) var(--ease-out);
    }
    @keyframes wbModalIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .wb-modal-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line-soft);
    }
    .wb-modal-head-main {
      display: flex; gap: 16px; align-items: center;
      min-width: 0; flex: 1;
    }

    .wb-modal-speaker {
      appearance: none; cursor: pointer;
      display: inline-flex; justify-content: center; align-items: center;
      width: 48px; height: 48px; flex-shrink: 0;
      border-radius: 999px;
      background: var(--brand-soft);
      border: 1px solid color-mix(in oklab, var(--brand) 22%, var(--line));
      color: var(--brand-ink);
      transition: background var(--dur) var(--ease-out),
                  transform var(--dur-fast) var(--ease-out),
                  box-shadow var(--dur) var(--ease-out);
    }
    .wb-modal-speaker:hover {
      background: color-mix(in oklab, var(--brand-soft) 55%, var(--brand));
      color: var(--panel);
    }
    .wb-modal-speaker:active { transform: scale(0.94); }
    .wb-modal-speaker.playing {
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--brand) 28%, transparent);
      animation: wbPulse var(--dur-slow) var(--ease-out);
    }
    .wb-modal-speaker svg { width: 22px; height: 22px; }
    /* Drill mode — the header speaker becomes a decorative "ear" glyph so
       the learner cannot simply click it to hear the word. It reads as part
       of the heading rather than an action, so it loses its button affordance. */
    .wb-modal-speaker.muted {
      background: var(--panel-soft);
      border-color: var(--line);
      color: var(--muted);
      cursor: default;
    }
    @keyframes wbPulse {
      0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--brand) 40%, transparent); }
      60%  { box-shadow: 0 0 0 10px color-mix(in oklab, var(--brand) 0%, transparent); }
      100% { box-shadow: 0 0 0 4px color-mix(in oklab, var(--brand) 28%, transparent); }
    }

    .wb-modal-word {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin: 2px 0 0;
    }
    /* Drill-mode heading — the word itself would give the answer away, so
       we render a short, quiet instruction instead. Smaller and lighter
       than the full word heading so the eye keeps travelling down to the
       sentence where the actual task lives. */
    .wb-modal-word.wb-modal-word-prompt {
      font-family: var(--font-sans);
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--ink-2);
    }

    .wb-modal-close {
      appearance: none; cursor: pointer;
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 1.3rem; line-height: 1; font-weight: 400;
      transition: background var(--dur) var(--ease-out),
                  color var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out);
    }
    .wb-modal-close:hover {
      background: var(--panel-soft);
      color: var(--ink);
      border-color: var(--line-strong);
    }

    .wb-modal-tabs {
      display: flex; gap: 4px;
      padding-top: 14px;
      margin-bottom: -1px; /* let the tab border meet the section border cleanly */
      border-bottom: 1px solid var(--line-soft);
    }
    .wb-modal-tab {
      appearance: none; cursor: pointer;
      padding: 8px 14px;
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font: inherit; font-weight: 600; font-size: 0.9rem;
      letter-spacing: -0.005em;
      transition: color var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out);
      margin-bottom: -1px;
    }
    .wb-modal-tab:hover { color: var(--ink-2); }
    .wb-modal-tab.on {
      color: var(--ink);
      border-bottom-color: var(--brand);
    }

    .wb-modal-body {
      padding: 18px 0 6px;
      display: flex; flex-direction: column; gap: 18px;
    }

    .wb-modal-section { display: flex; flex-direction: column; gap: 8px; }
    .wb-modal-section-family { margin-top: -2px; }
    /* FamilyChips component has its own top margin — cancel it inside the
       modal so the family block lines up with the other modal sections. */
    .wb-modal-section-family .family-chips {
      margin-top: 0;
      padding-left: 0;
    }

    .wb-modal-section-label {
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }

    .wb-modal-def {
      color: var(--ink);
      font-size: 1.02rem;
      line-height: 1.5;
      margin: 0;
    }

    .wb-modal-sample {
      border-left: 3px solid var(--brand);
      padding: 4px 0 4px 14px;
      margin: 0;
      color: var(--ink-2);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.05rem;
      line-height: 1.55;
    }
    .wb-modal-sample b {
      color: var(--brand-ink);
      font-style: normal;
      font-weight: 700;
    }

    .wb-drill-sentence {
      font-family: var(--font-serif);
      font-size: 1.12rem;
      line-height: 1.6;
      color: var(--ink);
      margin: 0;
    }
    .wb-drill-blank {
      display: inline-block;
      min-width: 96px;
      padding: 0 10px;
      border-bottom: 2px solid var(--brand);
      color: var(--brand-ink);
      font-weight: 700;
      font-style: normal;
      text-align: center;
      transition: color var(--dur) var(--ease-out),
                  border-color var(--dur) var(--ease-out);
    }
    .wb-drill-blank.revealed {
      border-bottom-color: var(--good);
      color: var(--good-strong);
    }

    /* Replay controls — sit directly under the sentence, mirror the session
       scene's audio row so the muscle-memory (icon shape, "playing" glow)
       is identical. Two buttons, same size; the slow one is a sibling rather
       than a secondary affordance — the learner might need it first. */
    .wb-drill-audio {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }
    .wb-drill-audio-btn {
      appearance: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 16px 10px 14px;
      background: var(--brand-soft);
      border: 1px solid color-mix(in oklab, var(--brand) 22%, var(--line));
      border-radius: 999px;
      color: var(--brand-ink);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      transition: background var(--dur) var(--ease-out),
                  color var(--dur) var(--ease-out),
                  transform var(--dur-fast) var(--ease-out),
                  box-shadow var(--dur) var(--ease-out);
    }
    .wb-drill-audio-btn:hover {
      background: color-mix(in oklab, var(--brand-soft) 55%, var(--brand));
      color: var(--panel);
    }
    .wb-drill-audio-btn:active { transform: scale(0.96); }
    .wb-drill-audio-btn:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 28%, transparent);
    }
    .wb-drill-audio-btn svg { width: 18px; height: 18px; }
    .wb-drill-audio-btn.playing {
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--brand) 26%, transparent);
      animation: wbPulse var(--dur-slow) var(--ease-out);
    }
    /* The slow replay button is quieter by default so "Replay" reads as the
       primary action — they share the same size so the learner can tap
       whichever one they want without re-targeting. */
    .wb-drill-audio-btn.slow {
      background: var(--panel-soft);
      border-color: var(--line);
      color: var(--ink-2);
    }
    .wb-drill-audio-btn.slow:hover {
      background: color-mix(in oklab, var(--panel-soft) 60%, var(--brand));
      color: var(--brand-ink);
      border-color: color-mix(in oklab, var(--brand) 28%, var(--line));
    }
    .wb-drill-audio-btn.slow.playing {
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--brand) 22%, transparent);
    }
    .wb-drill-audio-label { letter-spacing: 0.005em; }

    .wb-drill-form {
      display: flex; gap: 10px; align-items: center;
    }
    .wb-drill-input {
      flex: 1;
      appearance: none;
      padding: 12px 16px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--ink);
      font: inherit;
      font-family: var(--font-serif);
      font-size: 1.1rem;
      letter-spacing: -0.005em;
      transition: border-color var(--dur) var(--ease-out),
                  box-shadow var(--dur) var(--ease-out),
                  background var(--dur) var(--ease-out);
    }
    .wb-drill-input:focus {
      outline: 0;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--brand) 24%, transparent);
    }
    .wb-drill-input:disabled { opacity: 0.75; }
    .wb-drill-input::placeholder { color: var(--subtle); }

    .wb-drill-feedback {
      display: flex; gap: 12px; align-items: center;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .wb-drill-feedback.good {
      background: var(--good-soft);
      color: var(--good-strong);
    }
    .wb-drill-feedback.warn {
      background: var(--warn-soft);
      color: var(--warn-strong);
    }
    .wb-drill-feedback b { color: inherit; }
    .wb-drill-feedback-icon {
      flex-shrink: 0;
      width: 24px; height: 24px;
      display: inline-flex; justify-content: center; align-items: center;
      background: currentColor;
      border-radius: 999px;
      font-weight: 700; font-size: 0.9rem;
    }
    /* Knock the inner glyph back to the panel colour so it reads against
       the tinted circular background. */
    .wb-drill-feedback.good .wb-drill-feedback-icon,
    .wb-drill-feedback.warn .wb-drill-feedback-icon {
      color: var(--panel);
    }
    .wb-drill-feedback-icon svg { width: 14px; height: 14px; }

    .wb-modal-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      padding-top: 16px;
      border-top: 1px solid var(--line-soft);
      margin-top: 4px;
    }

    .wb-modal-note {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      margin: 12px 0 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .wb-modal-scrim, .wb-modal { animation: none; }
      .wb-modal-speaker,
      .wb-drill-input,
      .wb-drill-blank,
      .wb-drill-audio-btn,
      .wb-modal-close,
      .wb-modal-tab { transition: none; }
      .wb-modal-speaker:active,
      .wb-drill-audio-btn:active { transform: none; }
      .wb-modal-speaker.playing,
      .wb-drill-audio-btn.playing { animation: none; }
    }

    @media (max-width: 720px) {
      .wb-modal {
        padding: 22px 20px 18px;
        max-height: calc(100vh - 24px);
      }
      .wb-modal-word { font-size: 1.9rem; }
      .wb-modal-actions { flex-wrap: wrap; }
      .wb-drill-form { flex-direction: column; align-items: stretch; }
    }

    /* ==========================================================
       NEW: Session (question)
       ========================================================== */
    .session {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
    }
    .session-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 14px;
      padding: 0 4px;
      margin-bottom: 10px;
    }
    .path {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
    }
    .path-step {
      width: 10px; height: 10px;
      border-radius: 999px;
      background: color-mix(in oklab, var(--panel) 85%, transparent);
      /* Pending dots sit over variable hero art — a stronger ink border keeps
         them visible whether the bg is sky, field, or stonework. */
      border: 1.5px solid color-mix(in oklab, var(--ink) 55%, transparent);
      box-shadow: 0 0 0 1px color-mix(in oklab, var(--panel) 70%, transparent);
      flex-shrink: 0;
    }
    .path-step.done {
      background: var(--good);
      border-color: color-mix(in oklab, var(--good) 80%, var(--ink));
    }
    .path-step.current {
      width: 16px; height: 16px;
      background: var(--brand);
      border-color: color-mix(in oklab, var(--brand) 75%, var(--ink));
      box-shadow:
        0 0 0 1px color-mix(in oklab, var(--panel) 80%, transparent),
        0 0 0 5px color-mix(in oklab, var(--brand) 22%, transparent);
      animation: pulse-ring 2s var(--ease-in-out) infinite;
    }
    @keyframes pulse-ring {
      0%, 100% {
        box-shadow:
          0 0 0 1px color-mix(in oklab, var(--panel) 80%, transparent),
          0 0 0 5px color-mix(in oklab, var(--brand) 22%, transparent);
      }
      50% {
        box-shadow:
          0 0 0 1px color-mix(in oklab, var(--panel) 80%, transparent),
          0 0 0 8px color-mix(in oklab, var(--brand) 10%, transparent);
      }
    }
    .path-count {
      font-size: 0.82rem; font-weight: 800; color: var(--muted);
      padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px;
      background: var(--panel-soft);
    }

    .prompt-card {
      background: color-mix(in oklab, var(--panel) 80%, transparent);
      backdrop-filter: blur(8px) saturate(1.05);
      -webkit-backdrop-filter: blur(8px) saturate(1.05);
      border: 1px solid color-mix(in oklab, var(--line) 80%, transparent);
      border-radius: var(--radius-lg);
      padding: 40px 36px 32px;
      box-shadow: var(--shadow-warm);
      position: relative;
    }
    .prompt-card::before {
      content: "";
      position: absolute;
      left: 28px; right: 28px; top: 16px;
      height: 1px; background: color-mix(in oklab, var(--line-strong) 55%, transparent);
    }
    .prompt-instr {
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--ink-2);
      letter-spacing: -0.005em;
      margin-bottom: 18px;
    }
    .cloze {
      text-align: center;
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.2vw, 2.2rem);
      font-weight: 500;
      letter-spacing: -0.015em;
      line-height: 1.2;
      margin-bottom: 24px;
      color: var(--ink);
    }
    .cloze .blank {
      display: inline-block;
      min-width: 120px;
      border-bottom: 3px solid var(--brand);
      margin: 0 6px;
      color: var(--brand);
      font-style: italic;
    }
    .word-input-wrap {
      position: relative;
      max-width: 560px;
      margin: 0 auto;
    }
    .word-input {
      width: 100%;
      font-family: var(--font-serif);
      font-size: clamp(1.7rem, 3.6vw, 2.4rem);
      font-weight: 500;
      letter-spacing: -0.005em;
      text-align: center;
      padding: 14px 20px 20px;
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      border-bottom: 2.5px solid var(--line-strong);
      transition: border-color var(--dur) var(--ease-out);
    }
    .word-input::placeholder { color: var(--subtle); font-style: italic; }
    .word-input:focus { border-bottom-color: var(--brand); }

    .audio-row {
      display: flex; justify-content: center; gap: 10px;
      margin-top: 20px;
    }
    .action-row {
      display: flex; justify-content: center; gap: 10px;
      margin-top: 26px;
      flex-wrap: wrap;
    }
    .phase-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      font-size: 0.78rem; font-weight: 800; letter-spacing: 0.04em;
      background: var(--panel-soft); border: 1px solid var(--line);
      color: var(--ink-2);
    }
    .phase-badge.learning { background: color-mix(in oklab, var(--brand) 10%, var(--panel)); color: var(--brand-ink); border-color: color-mix(in oklab, var(--brand) 30%, transparent); }
    .phase-badge.final { background: var(--warn-soft); color: var(--warn-strong); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
    .phase-badge.test { background: color-mix(in oklab, var(--ink) 10%, var(--panel)); color: var(--ink); border-color: var(--line-strong); }

    .session-footer {
      margin-top: 28px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .keys-hint { color: var(--subtle); font-size: 0.82rem; font-weight: 600; }
    .keys-hint kbd {
      display: inline-block; padding: 1px 6px; border-radius: 5px;
      background: var(--panel-soft); border: 1px solid var(--line);
      font-family: var(--font-mono); font-size: 0.74rem;
      margin: 0 2px;
      color: var(--ink-2);
    }

    /* Companion dock during session: sits at the top-left of the prompt-card
       like a book-plate / illuminated initial. Anchored to .session (top +
       session-head height) so it stays put when ribbon / family chips grow
       the card.
       Values assume .session-head ≈ 28px + 10px margin-bottom = 38px from top. */
    .companion-dock {
      position: absolute;
      left: -8px;
      top: 60px;
      width: 84px; height: 84px;
      pointer-events: none;
      z-index: 2;
    }
    .companion-dock img {
      width: 100%; height: auto;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,0.18));
      animation: companion-float 6s ease-in-out infinite;
    }

    /* ==========================================================
       NEW: Feedback ribbons (inline, non-destructive)
       ========================================================== */
    /* Feedback slot — renders ribbon + family chips for correct/wrong variants
       and acts as an invisible height placeholder on the question variant so
       the prompt-card keeps the same total height across all three states. */
    .feedback-slot.is-placeholder { visibility: hidden; }
    .feedback-slot.is-placeholder * { animation: none !important; }

    .ribbon {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      /* Fixed min-height so correct (with word chip) and wrong (sub-only) come
         out identical — prevents a 3px drift between the two feedback states.
         box-sizing is border-box, so 84 == full rendered height of the tallest
         natural layout (the correct ribbon with its word chip). */
      min-height: 84px;
      animation: ribbon-in var(--dur-slow) var(--ease-out);
    }
    @keyframes ribbon-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ribbon.good {
      background: var(--good-soft);
      border-color: color-mix(in oklab, var(--good) 30%, transparent);
      color: var(--good-strong);
    }
    .ribbon.warn {
      background: var(--warn-soft);
      border-color: color-mix(in oklab, var(--warn) 30%, transparent);
      color: var(--warn-strong);
    }
    .ribbon.bad {
      background: var(--bad-soft);
      border-color: color-mix(in oklab, var(--bad) 30%, transparent);
      color: var(--bad-strong);
    }
    .ribbon-ic {
      width: 36px; height: 36px; border-radius: 999px;
      display: grid; place-items: center;
      background: rgba(255,255,255,0.55);
      font-weight: 800; font-size: 1.2rem;
    }
    .ribbon-body b {
      font-family: var(--font-serif); font-weight: 500;
      font-size: 1.15rem; letter-spacing: -0.01em;
    }
    .ribbon-body .word {
      font-family: var(--font-serif); font-weight: 500;
      font-size: 1.3rem; margin-left: 4px; letter-spacing: -0.01em;
    }
    .ribbon-body .sub {
      font-size: 0.88rem; margin-top: 2px; color: inherit; opacity: 0.85;
    }

    .family-chips {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 14px; padding-left: 4px;
    }
    .family-chips .flabel { font-size: 0.76rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); align-self: center; }
    .fchip {
      padding: 5px 12px; border-radius: 999px;
      background: var(--panel-soft); border: 1px solid var(--line);
      font-family: var(--font-serif);
      font-size: 1.02rem; font-weight: 500; letter-spacing: -0.005em;
      color: var(--ink);
    }

    /* ==========================================================
       NEW: Summary (page complete)
       Shares the session shell's typography, hero bg and prompt-card
       surface so the round-end reads as one more beat of the same
       flow rather than a separate view. Extras layered on top:
         - summary-stats: compact 4-up grid (was pc-stats)
         - summary-drill: tinted "another go" block (was pc-drill)
         - summary-wander: non-interactive happy-monster overlay
         - summary-fireworks: full-screen particle celebration
