<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>KS2 Mastery — Redesign v1 (Codex Journal)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800;900&display=swap" />

  <script>
    (function () {
      try {
        var stored = localStorage.getItem('ks2.design.theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      } catch (err) {}
    })();
  </script>

  <style>
    /* ==========================================================
       Token system (mirrors /styles/app.css, do not drift)
       ========================================================== */
    :root {
      color-scheme: light dark;

      --bg: #F6F5F1;
      --bg-tint: #EFEADD;
      --panel: #FFFFFF;
      --panel-soft: #FAF9F4;
      --panel-sunken: #F1ECDE;

      --ink: #1D2B3A;
      --ink-2: #3B4A5C;
      --muted: #7A8697;
      --subtle: #A9B1BD;

      --line: #E5E1D6;
      --line-soft: #EFEBE0;
      --line-strong: #CFC8B6;

      --good: #2F9E6A;
      --good-strong: #1F7A4F;
      --good-soft: #E4F5EC;
      --warn: #D08A2C;
      --warn-strong: #9E6A19;
      --warn-soft: #FBEFD9;
      --bad: #D25757;
      --bad-strong: #B03838;
      --bad-soft: #FCE5E3;

      --brand: #3E6FA8;
      --brand-ink: #274D79;
      --brand-soft: #DCE6F3;

      --inklet: #3E6FA8;
      --inklet-soft: #E8F0FA;
      --glimmer: #B43CD9;
      --glimmer-soft: #F8E7F1;
      --phaeton: #D08A2C;
      --phaeton-soft: #F6EED7;

      --radius-xs: 8px;
      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 28px;
      --radius-xl: 32px;

      --shadow-xs: 0 1px 2px rgba(29,43,58,0.06);
      --shadow: 0 1px 2px rgba(29,43,58,0.04), 0 8px 24px rgba(29,43,58,0.06);
      --shadow-lg: 0 2px 4px rgba(29,43,58,0.05), 0 16px 40px rgba(29,43,58,0.10);
      --shadow-glow: 0 0 0 4px rgba(62,111,168,0.18);
      --shadow-warm: 0 24px 48px -24px rgba(176, 132, 66, 0.35);

      --font-display: "Fraunces", Georgia, "Iowan Old Style", serif;
      --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-serif: "Fraunces", Georgia, serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --dur-fast: 120ms;
      --dur: 200ms;
      --dur-slow: 320ms;
      --dur-slower: 520ms;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0F1620;
        --bg-tint: #131C29;
        --panel: #18212F;
        --panel-soft: #1E2837;
        --panel-sunken: #14202F;

        --ink: #F3EEE0;
        --ink-2: #D4D9E3;
        --muted: #8B95A6;
        --subtle: #5F6A7C;

        --line: #2A3444;
        --line-soft: #212A39;
        --line-strong: #3D4A60;

        --good: #57C48B;
        --good-strong: #8AD7AE;
        --good-soft: color-mix(in oklab, #2F9E6A 22%, #0F1620);
        --warn: #E2A756;
        --warn-strong: #F1C081;
        --warn-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);
        --bad: #E87E7E;
        --bad-strong: #F6A7A7;
        --bad-soft: color-mix(in oklab, #D25757 22%, #0F1620);

        --brand: #6E9ED6;
        --brand-ink: #A7C2E4;
        --brand-soft: color-mix(in oklab, #3E6FA8 26%, #0F1620);

        --inklet: #6E9ED6;
        --inklet-soft: color-mix(in oklab, #3E6FA8 24%, #0F1620);
        --glimmer: #D289EA;
        --glimmer-soft: color-mix(in oklab, #B43CD9 22%, #0F1620);
        --phaeton: #E2A756;
        --phaeton-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);

        --shadow-xs: 0 1px 2px rgba(0,0,0,0.35);
        --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 12px 28px rgba(0,0,0,0.35);
        --shadow-lg: 0 2px 4px rgba(0,0,0,0.4), 0 24px 48px rgba(0,0,0,0.5);
        --shadow-glow: 0 0 0 4px rgba(110,158,214,0.26);
        --shadow-warm: 0 32px 60px -28px rgba(0,0,0,0.6);
      }
    }

    :root[data-theme="dark"] {
      --bg: #0F1620;
      --bg-tint: #131C29;
      --panel: #18212F;
      --panel-soft: #1E2837;
      --panel-sunken: #14202F;
      --ink: #F3EEE0;
      --ink-2: #D4D9E3;
      --muted: #8B95A6;
      --subtle: #5F6A7C;
      --line: #2A3444;
      --line-soft: #212A39;
      --line-strong: #3D4A60;
      --good: #57C48B;
      --good-strong: #8AD7AE;
      --good-soft: color-mix(in oklab, #2F9E6A 22%, #0F1620);
      --warn: #E2A756;
      --warn-strong: #F1C081;
      --warn-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);
      --bad: #E87E7E;
      --bad-strong: #F6A7A7;
      --bad-soft: color-mix(in oklab, #D25757 22%, #0F1620);
      --brand: #6E9ED6;
      --brand-ink: #A7C2E4;
      --brand-soft: color-mix(in oklab, #3E6FA8 26%, #0F1620);
      --inklet: #6E9ED6;
      --inklet-soft: color-mix(in oklab, #3E6FA8 24%, #0F1620);
      --glimmer: #D289EA;
      --glimmer-soft: color-mix(in oklab, #B43CD9 22%, #0F1620);
      --phaeton: #E2A756;
      --phaeton-soft: color-mix(in oklab, #D08A2C 22%, #0F1620);
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.35);
      --shadow: 0 1px 2px rgba(0,0,0,0.35), 0 12px 28px rgba(0,0,0,0.35);
      --shadow-lg: 0 2px 4px rgba(0,0,0,0.4), 0 24px 48px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 0 4px rgba(110,158,214,0.26);
      --shadow-warm: 0 32px 60px -28px rgba(0,0,0,0.6);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    /* ==========================================================
       Base / reset
       ========================================================== */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(1100px 700px at 82% -12%, var(--bg-tint), transparent 60%),
        radial-gradient(1000px 560px at -8% 96%, var(--bg-tint), transparent 55%),
        var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      line-height: 1.5;
      text-wrap: pretty;
    }
    button, input, select, textarea { font: inherit; }
    a { color: inherit; }
    ::selection { background: color-mix(in oklab, var(--brand) 28%, transparent); color: inherit; }

    /* ==========================================================
       Design shell (critique view — not part of product)
       ========================================================== */
    .design-shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .design-rail {
      border-right: 1px solid var(--line);
      background: color-mix(in oklab, var(--panel-soft) 96%, transparent);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .design-rail h2 {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      letter-spacing: -0.01em;
      margin: 0 0 2px;
    }
    .design-rail .eyebrow { font-size: 10px; margin-bottom: 10px; }
    .design-rail .rail-group {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin: 14px 6px 6px;
    }
    .rail-item {
      appearance: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink-2);
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      font-family: inherit;
      transition: background var(--dur) var(--ease-out), color var(--dur) var(--ease-out);
    }
    .rail-item:hover { background: var(--panel-sunken); }
    .rail-item.active {
      background: var(--panel);
      border-color: var(--line);
      color: var(--ink);
      box-shadow: var(--shadow-xs);
    }
    .rail-item .dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--subtle);
    }
    .rail-item.active .dot { background: var(--brand); }

    .design-canvas {
      min-height: 100vh;
      padding: 24px 24px 60px;
    }
    .design-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .tool-chip-row { display: inline-flex; gap: 6px; align-items: center; }
    .tool-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .seg {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px;
      background: var(--panel-soft);
      gap: 2px;
    }
    .seg button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--ink-2);
    }
    .seg button.on {
      background: var(--panel);
      color: var(--ink);
      box-shadow: var(--shadow-xs);
    }

    /* Device frame */
    .device-frame {
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      transition: max-width var(--dur-slow) var(--ease-out);
    }
    .device-frame.desktop { max-width: 1240px; }
    .device-frame.mobile { max-width: 390px; border-radius: 40px; padding: 8px; background: #2B2B2B; }
    .device-frame.mobile .device-inner {
      border-radius: 32px;
      overflow: hidden;
      background: var(--bg);
    }
    .device-frame.desktop .device-inner { background: var(--bg); }
    .device-inner { min-height: 700px; position: relative; }

    /* ==========================================================
       App-level shared primitives (mirrors real app)
       ========================================================== */
    .app-shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
    }
    .app-shell.mobile { padding: 16px; }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      padding: 10px 16px;
      font-weight: 800;
      font-size: 0.95rem;
      transition: transform 0.05s ease, filter 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { filter: brightness(0.98); }
    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn.primary { background: var(--brand); color: white; }
    .btn.primary:hover { background: var(--brand-ink); }
    .btn.secondary { background: var(--panel-soft); border-color: var(--line); color: var(--ink); }
    .btn.ghost { background: transparent; border-color: var(--line); color: var(--ink); }
    .btn.good { background: var(--good); color: white; }
    .btn.bad { background: transparent; color: var(--bad); border-color: var(--bad-soft); }
    .btn.lg { padding: 14px 22px; font-size: 1.02rem; }
    .btn.xl { padding: 16px 26px; font-size: 1.08rem; border-radius: 999px; }
    .btn.sm { padding: 7px 12px; font-size: 0.85rem; }
    .btn.icon {
      width: 42px; height: 42px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--panel-soft); border-color: var(--line); color: var(--ink);
    }
    .btn.icon.lg { width: 52px; height: 52px; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--ink-2);
    }
    .chip.good { background: var(--good-soft); color: var(--good-strong); border-color: color-mix(in oklab, var(--good) 30%, transparent); }
    .chip.warn { background: var(--warn-soft); color: var(--warn-strong); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
    .chip.bad { background: var(--bad-soft); color: var(--bad-strong); border-color: color-mix(in oklab, var(--bad) 30%, transparent); }
    .chip.brand { background: var(--brand-soft); color: var(--brand-ink); border-color: color-mix(in oklab, var(--brand) 30%, transparent); }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .card.soft { background: var(--panel-soft); }
    .card.sunken { background: var(--panel-sunken); }

    .eyebrow {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .title-xl {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(2.2rem, 4.2vw, 3.4rem);
      line-height: 1.0;
      letter-spacing: -0.025em;
      font-weight: 500;
    }
    .title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(1.7rem, 2.6vw, 2.3rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      font-weight: 500;
    }
    .section-title {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 1.35rem;
      letter-spacing: -0.01em;
      font-weight: 500;
    }
    .lede {
      margin: 10px 0 0;
      color: var(--ink-2);
      line-height: 1.5;
      font-size: 1.02rem;
      max-width: 58ch;
    }
    .muted { color: var(--muted); }
    .small { font-size: 0.88rem; }

    /* ==========================================================
       NEW: Hero (landing)
       ========================================================== */
    .hero-paper {
      position: relative;
      border-radius: var(--radius-lg);
      padding: 40px 36px 32px;
      overflow: hidden;
      min-height: 380px;
      background:
        radial-gradient(140% 100% at 100% 0%, color-mix(in oklab, var(--inklet) 18%, transparent), transparent 60%),
        radial-gradient(120% 100% at 0% 100%, color-mix(in oklab, var(--phaeton) 14%, transparent), transparent 60%),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-warm);
    }
    .hero-paper::before, .hero-paper::after {
      content: "";
      position: absolute;
      left: 32px; right: 32px;
      height: 1px;
      background: color-mix(in oklab, var(--line-strong) 60%, transparent);
      z-index: 1;
    }
    .hero-paper::before { top: 22px; }
    .hero-paper::after { bottom: 22px; }

    /* Region art layer — a randomised regional background softened with a
       panel-colour wash so the left-side text stays legible in both themes. */
    .hero-art {
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: inherit;
      background: var(--hero-bg, none) center 42% / cover no-repeat;
      pointer-events: none;
      overflow: hidden;
    }
    .hero-art::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          100deg,
          color-mix(in oklab, var(--panel) 88%, transparent) 0%,
          color-mix(in oklab, var(--panel) 66%, transparent) 32%,
          color-mix(in oklab, var(--panel) 28%, transparent) 62%,
          color-mix(in oklab, var(--panel) 10%, transparent) 100%
        ),
        linear-gradient(
          180deg,
          color-mix(in oklab, var(--panel) 20%, transparent),
          transparent 38%,
          transparent 72%,
          color-mix(in oklab, var(--panel) 26%, transparent)
        );
      pointer-events: none;
    }

    /* Hero text sits above the roaming monsters (z:0). Capped width
       keeps the right side clear so companions have room to drift. */
    .hero-mission {
      position: relative;
      z-index: 2;
      max-width: 58%;
    }
    .hero-mission .greet {
      font-family: var(--font-serif);
      font-size: 0.98rem;
      color: var(--ink-2);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .hero-mission .greet b { font-weight: 700; color: var(--ink); }
    .hero-mission .mission {
      font-family: var(--font-serif);
      font-size: clamp(2.1rem, 4.2vw, 3.1rem);
      line-height: 1.02;
      letter-spacing: -0.025em;
      font-weight: 500;
      margin: 4px 0 0;
      color: var(--ink);
    }
    .hero-mission .mission em {
      font-style: italic;
      color: var(--brand);
    }
    .hero-mission .hero-cta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 22px; align-items: center; }
    .hero-mission .hero-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 16px; }

    .companion-stage {
      position: relative;
      height: 260px;
      border-radius: var(--radius-lg);
      background:
        radial-gradient(closest-side, color-mix(in oklab, var(--inklet) 26%, transparent), transparent 70%),
        var(--panel-soft);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .companion-stage::after {
      content: "";
      position: absolute;
      left: 14%; right: 14%;
      bottom: 14%;
      height: 12px;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(29,43,58,0.28), transparent 70%);
      filter: blur(2px);
    }
    .companion-stage.small { height: 120px; }
    .companion-stage.petite { height: 84px; border-radius: var(--radius); }
    .companion-img {
      position: relative;
      width: 200px;
      height: auto;
      animation: companion-float 5.4s ease-in-out infinite;
      filter: drop-shadow(0 14px 20px rgba(0,0,0,0.18));
    }
    .companion-img.small { width: 96px; }
    .companion-img.petite { width: 60px; }
    .companion-img.bounce { animation: companion-bounce 500ms var(--ease-out) 1; }
    @keyframes companion-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes companion-bounce {
      0% { transform: translateY(0) scale(1); }
      30% { transform: translateY(-14px) scale(1.04); }
      60% { transform: translateY(0) scale(0.98); }
      100% { transform: translateY(0) scale(1); }
    }

    /* ==========================================================
       NEW: Monster meadow (hero background layer)
       Caught monsters roam the entire hero paper. The meadow is
       an absolute overlay that shares space with the hero text;
       text sits above via z-index, monsters drift behind.
       Three path keyframes give variety: walk (ground), fly-a
       (looping), fly-b (drifty). Outer wraps translate + flip;
       inner <img> handles the idle bob so transforms don't clash.
       ========================================================== */
    .monster-meadow {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
      border-radius: var(--radius-lg);
    }
    .monster-meadow.empty {
      display: flex; align-items: center; justify-content: center;
    }
    .monster-meadow .meadow-empty-note {
      font-family: var(--font-serif);
      color: var(--ink-3);
      font-size: 0.96rem;
      padding: 0 24px;
      text-align: center;
    }
    .meadow-monster {
      position: absolute;
      left: var(--left, 50%);
      top: var(--top, 50%);
      width: var(--size, 64px);
      height: var(--size, 64px);
      animation-duration: var(--dur, 18s);
      animation-delay: var(--delay, 0s);
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
      will-change: transform;
      pointer-events: none;
    }
    .meadow-monster[data-path="walk"]  { animation-name: meadow-walk;  }
    .meadow-monster[data-path="fly-a"] { animation-name: meadow-fly-a; }
    .meadow-monster[data-path="fly-b"] { animation-name: meadow-fly-b; }
    /* Eggs (stage 0) sit still in the middle-lower band and never wander;
       we also mute the idle bob on their <img> child. */
    .meadow-monster.egg,
    .meadow-monster.egg img { animation: none; }
    .meadow-monster img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: meadow-bob 3.4s ease-in-out infinite;
      animation-delay: var(--bob-delay, 0s);
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.12));
    }
    /* Ground shadow — ellipse anchored below each monster. Walkers get
       a denser shadow (feet planted); flyers get a fainter, smaller one
       so they still feel airborne when they drift over it. */
    .meadow-shadow {
      position: absolute;
      left: 12%; right: 12%;
      bottom: -4px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(29,43,58,0.32), rgba(29,43,58,0.10) 55%, transparent 75%);
      filter: blur(4px);
      pointer-events: none;
      z-index: 0;
    }
    .meadow-monster[data-path="fly-a"] .meadow-shadow,
    .meadow-monster[data-path="fly-b"] .meadow-shadow {
      left: 22%; right: 22%;
      bottom: -8px;
      height: 10px;
      background: radial-gradient(ellipse at center, rgba(29,43,58,0.18), transparent 70%);
      filter: blur(5px);
      opacity: 0.75;
    }
    [data-theme="dark"] .meadow-shadow {
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.55), rgba(0,0,0,0.20) 55%, transparent 75%);
    }
    [data-theme="dark"] .meadow-monster[data-path="fly-a"] .meadow-shadow,
    [data-theme="dark"] .meadow-monster[data-path="fly-b"] .meadow-shadow {
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.32), transparent 70%);
    }

    /* Flip cadence: the ~1% window around each scaleX sign change
       becomes a quick spin (roughly 0.1–0.25s depending on duration),
       short enough that the squish through scaleX(0) reads as a turn,
       not a squash. The outer segments keep the default ease-in-out.
       `--face` (1 for right-drawn sprites, -1 for left-drawn ones) flips
       every X translation and rotation sign so the character always moves
       in the direction its face is drawn pointing. scaleX cycles the same
       way regardless: when flipped, direction naturally reverses too. */
    /* walk — ground creature, horizontal only, flips around. */
    @keyframes meadow-walk {
      0%    { transform: translate(0, 0) scaleX(1); }
      24%   { transform: translate(calc(var(--face, 1) *  58px), 0) scaleX(1); }
      25%   { transform: translate(calc(var(--face, 1) *  58px), 0) scaleX(-1); }
      74%   { transform: translate(calc(var(--face, 1) * -38px), 0) scaleX(-1); }
      75%   { transform: translate(calc(var(--face, 1) * -38px), 0) scaleX(1); }
      100%  { transform: translate(0, 0) scaleX(1); }
    }
    /* fly-a — wide loop, gentle bank. */
    @keyframes meadow-fly-a {
      0%    { transform: translate(0, 0) rotate(0deg) scaleX(1); }
      29%   { transform: translate(calc(var(--face, 1) *  92px), 2px)  rotate(calc(var(--face, 1) * -2deg)) scaleX(1); }
      30%   { transform: translate(calc(var(--face, 1) *  92px), 2px)  rotate(calc(var(--face, 1) * -2deg)) scaleX(-1); }
      70%   { transform: translate(calc(var(--face, 1) * -40px), 16px) rotate(calc(var(--face, 1) *  3deg)) scaleX(-1); }
      71%   { transform: translate(calc(var(--face, 1) * -40px), 16px) rotate(calc(var(--face, 1) *  3deg)) scaleX(1); }
      100%  { transform: translate(0, 0) rotate(0deg) scaleX(1); }
    }
    /* fly-b — drifty counter-loop, wider X. */
    @keyframes meadow-fly-b {
      0%    { transform: translate(0, 0) rotate(0deg) scaleX(1); }
      8%    { transform: translate(calc(var(--face, 1) * -20px), -6px) rotate(calc(var(--face, 1) * -1deg)) scaleX(1); }
      9%    { transform: translate(calc(var(--face, 1) * -20px), -6px) rotate(calc(var(--face, 1) * -1deg)) scaleX(-1); }
      60%   { transform: translate(calc(var(--face, 1) * -96px), 26px) rotate(calc(var(--face, 1) * -2deg)) scaleX(-1); }
      61%   { transform: translate(calc(var(--face, 1) * -96px), 26px) rotate(calc(var(--face, 1) * -2deg)) scaleX(1); }
      100%  { transform: translate(0, 0) rotate(0deg) scaleX(1); }
    }
    @keyframes meadow-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .meadow-monster,
      .meadow-monster img { animation: none; }
    }

    /* ==========================================================
       NEW: Codex rail (home)
       ========================================================== */
    .codex-rail {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .codex-tile {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background:
        linear-gradient(180deg, var(--panel) 0%, color-mix(in oklab, var(--panel-soft) 55%, var(--panel)) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out), border-color var(--dur) var(--ease-out);
    }
    .codex-tile:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: color-mix(in oklab, var(--brand) 22%, var(--line));
    }
    .codex-tile .cx-portrait {
      width: 50px; height: 50px; border-radius: 14px;
      display: grid; place-items: center;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--ink) 6%, transparent);
    }
    .codex-tile .cx-portrait img { width: 44px; height: auto; }
    .codex-tile .cx-info { min-width: 0; }
    .codex-tile .cx-name {
      font-family: var(--font-serif);
      font-size: 1rem;
      letter-spacing: -0.01em;
      font-weight: 500;
      line-height: 1.15;
      color: var(--ink);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .codex-tile .cx-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .codex-tile.locked { background: var(--panel-soft); }
    .codex-tile.locked .cx-portrait img { filter: grayscale(0.55) brightness(0.96); }
    .codex-tile.locked .cx-name { color: var(--ink-2); }

    /* Ring — big enough to hold the percentage inside */
    .cx-ring {
      --p: 40;
      --ring-color: var(--brand);
      position: relative;
      width: 40px; height: 40px;
      border-radius: 999px;
      background: conic-gradient(var(--ring-color) calc(var(--p) * 1%), var(--line-soft) 0);
      flex-shrink: 0;
    }
    .cx-ring::before {
      content: "";
      position: absolute; inset: 4px;
      background: var(--panel);
      border-radius: 999px;
    }
    .cx-ring .cx-pct {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      font-family: var(--font-serif);
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .codex-tile.locked .cx-ring .cx-pct { color: var(--ink-2); }

    /* Legacy small ring kept for any other callers */
    .ring {
      --p: 40;
      width: 20px; height: 20px;
      border-radius: 999px;
      background: conic-gradient(var(--inklet) calc(var(--p) * 1%), var(--line-soft) 0);
      position: relative;
    }
    .ring::after {
      content: "";
      position: absolute; inset: 3px;
      background: var(--panel);
      border-radius: 999px;
    }

    /* ==========================================================
       NEW: Subject cards
       ========================================================== */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }
    .subject-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      color: var(--ink);
      padding: 0;
      margin: 0;
      overflow: hidden;
      box-shadow: var(--shadow-xs);
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
    }
    .subject-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .subject-card .sc-banner {
      height: 132px;
      position: relative;
      display: flex; justify-content: flex-end; align-items: flex-start;
      padding: 14px 16px;
      overflow: hidden;
    }
    .subject-card .sc-banner::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(130% 70% at 88% 10%, rgba(255,255,255,0.30), transparent 62%);
      pointer-events: none;
    }
    /* Banner with region artwork: image fills the full banner, no gradient highlight overlay. */
    .subject-card .sc-banner--art { padding: 0; }
    .subject-card .sc-banner--art::after { display: none; }
    .subject-card .sc-banner-art {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 38%;
      display: block;
    }
    /* Soft bottom fade so body text keeps enough contrast even with dark art. */
    .subject-card .sc-banner--art .sc-banner-fade {
      position: absolute; left: 0; right: 0; bottom: 0; height: 38%;
      background: linear-gradient(to bottom, transparent, color-mix(in oklab, var(--panel) 72%, transparent));
      pointer-events: none;
    }
    /* Art cards bleed edge-to-edge: make the in-flow border transparent (preserves layout parity with other cards) and paint the visible 1px outline via box-shadow just outside the border-box. */
    .subject-card:has(.sc-banner--art) {
      border-color: transparent;
      box-shadow: 0 0 0 1px var(--line), var(--shadow-xs);
    }
    .subject-card:has(.sc-banner--art):hover {
      box-shadow: 0 0 0 1px var(--line), var(--shadow);
    }
    .subject-card .sc-glyph {
      position: absolute;
      left: 18px;
      bottom: -10px;
      font-family: var(--font-serif);
      font-size: 4.2rem;
      font-weight: 500;
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 0 rgba(0,0,0,0.08);
      pointer-events: none;
    }
    .subject-card .sc-status {
      position: relative;
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      padding: 4px 10px; border-radius: 999px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
      z-index: 1;
    }
    .subject-card .sc-body {
      padding: 18px 20px 20px;
      display: flex; flex-direction: column;
      flex: 1;
    }
    .subject-card .sc-eyebrow {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      min-height: calc(0.72rem * 1.2);
    }
    .subject-card h3 {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      letter-spacing: -0.015em;
      font-weight: 500;
      margin: 0;
    }
    .subject-card p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }
    .subject-card .sc-meter {
      margin-top: auto;
      padding-top: 16px;
      display: grid;
      gap: 8px;
    }
    .subject-card .sc-meter-head {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
    }
    .subject-card .sc-pct {
      font-family: var(--font-serif);
      font-size: 1.02rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .subject-card .sc-meta {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-align: right;
    }
    .progress {
      height: 10px; background: var(--line-soft); border-radius: 999px; overflow: hidden;
    }
    .progress > span {
      display: block; height: 100%; border-radius: 999px;
      transition: width var(--dur-slow) var(--ease-out);
    }

    .subject-card.placeholder .sc-banner { filter: saturate(0.35) brightness(0.99); }
    .subject-card.placeholder .sc-glyph  { color: rgba(255,255,255,0.62); }
    .subject-card.placeholder .sc-pct    { color: var(--ink-2); }

    /* ==========================================================
       NEW: Spelling setup
       ========================================================== */
    .setup-grid {
      display: grid;
      grid-template-columns: 1.65fr 1fr;
      gap: 22px;
      align-items: start;
    }
    .setup-main {
      padding: 28px 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow-warm);
      position: relative;
    }
    .setup-main::before {
      content: "";
      position: absolute;
      left: 24px; right: 24px; top: 14px;
      height: 1px;
      background: color-mix(in oklab, var(--line-strong) 60%, transparent);
    }
    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 20px 0 0;
    }
    .mode-card {
      position: relative;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 18px 16px 18px;
      cursor: pointer;
      text-align: left;
      transition: transform var(--dur) var(--ease-out), border-color var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
    }
    .mode-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .mode-card.selected {
      border-color: var(--brand);
      background: linear-gradient(180deg, color-mix(in oklab, var(--brand-soft) 55%, var(--panel)) 0%, var(--panel) 70%);
      box-shadow: var(--shadow);
    }
    .mode-card .mc-icon {
      width: 42px; height: 42px; border-radius: 14px;
      background: var(--panel-sunken);
      display: grid; place-items: center;
      margin-bottom: 10px;
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 500;
    }
    .mode-card.selected .mc-icon { background: var(--brand); color: white; }
    .mode-card h4 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 1.08rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--ink);
    }
    .mode-card.selected h4 { color: var(--brand-ink); font-weight: 600; }
    .mode-card.selected p  { color: var(--ink-2); }
    .mode-card p { margin: 4px 0 0; color: var(--muted); font-size: 0.87rem; line-height: 1.4; }
    .mode-card .mc-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px; border-radius: 999px;
      background: var(--good-soft); color: var(--good-strong);
    }

    .tweak-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 18px 0 2px;
      border-top: 1px dashed var(--line);
      margin-top: 20px;
    }
    .toggle-chip {
      appearance: none; border: 1px solid var(--line); background: var(--panel-soft);
      padding: 7px 12px; border-radius: 999px; font-weight: 700; font-size: 0.84rem;
      color: var(--ink-2); cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .toggle-chip .box {
      width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--line-strong);
      background: var(--panel);
      display: inline-grid; place-items: center;
    }
    .toggle-chip.on { background: var(--brand-soft); color: var(--brand-ink); border-color: color-mix(in oklab, var(--brand) 30%, transparent); }
    .toggle-chip.on .box { background: var(--brand); border-color: var(--brand); color: white; }
    .toggle-chip .box svg { display: block; }

    .stepper {
      display: inline-flex; align-items: center; gap: 0;
      border: 1px solid var(--line); border-radius: 999px; background: var(--panel-soft);
      padding: 2px;
    }
    .stepper button {
      appearance: none; background: transparent; border: 0;
      width: 30px; height: 30px; border-radius: 999px;
      cursor: pointer; color: var(--ink-2); font-size: 1.2rem; font-weight: 700;
    }
    .stepper button:hover { background: var(--panel); }
    .stepper .val {
      min-width: 40px; text-align: center;
      font-weight: 800; font-size: 0.95rem;
      color: var(--ink);
    }
    .stepper .val em { font-style: normal; color: var(--muted); font-weight: 600; font-size: 0.8rem; margin-left: 2px; }

    .setup-side .ss-card {
      padding: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-xs);
    }
    .ss-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .ss-stat {
      padding: 12px 14px;
      background: var(--panel-soft);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
    }
    .ss-stat-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .ss-stat-value { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 500; margin-top: 2px; letter-spacing: -0.015em; }

    /* ==========================================================
       NEW: Session (question)
       ========================================================== */
    .session {
      max-width: 780px;
      margin: 0 auto;
      position: relative;
    }
    .session-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 14px;
      padding: 0 4px;
      margin-bottom: 10px;
    }
    .path {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
    }
    .path-step {
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--line-soft);
      border: 1.5px solid var(--line);
      flex-shrink: 0;
    }
    .path-step.done { background: var(--good); border-color: var(--good); }
    .path-step.current {
      width: 16px; height: 16px;
      background: var(--brand);
      border-color: var(--brand);
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--brand) 22%, transparent);
      animation: pulse-ring 2s var(--ease-in-out) infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 4px color-mix(in oklab, var(--brand) 22%, transparent); }
      50% { box-shadow: 0 0 0 7px color-mix(in oklab, var(--brand) 10%, transparent); }
    }
    .path-count {
      font-size: 0.82rem; font-weight: 800; color: var(--muted);
      padding: 5px 10px; border: 1px solid var(--line); border-radius: 999px;
      background: var(--panel-soft);
    }

    .prompt-card {
      background:
        linear-gradient(180deg, var(--panel) 0%, color-mix(in oklab, var(--panel-soft) 80%, var(--panel)) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 40px 36px 32px;
      box-shadow: var(--shadow-warm);
      position: relative;
    }
    .prompt-card::before {
      content: "";
      position: absolute;
      left: 28px; right: 28px; top: 16px;
      height: 1px; background: color-mix(in oklab, var(--line-strong) 55%, transparent);
    }
    .prompt-instr {
      text-align: center;
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--ink-2);
      letter-spacing: -0.005em;
      margin-bottom: 18px;
    }
    .cloze {
      text-align: center;
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.2vw, 2.2rem);
      font-weight: 500;
      letter-spacing: -0.015em;
      line-height: 1.2;
      margin-bottom: 24px;
      color: var(--ink);
    }
    .cloze .blank {
      display: inline-block;
      min-width: 120px;
      border-bottom: 3px solid var(--brand);
      margin: 0 6px;
      color: var(--brand);
      font-style: italic;
    }
    .word-input-wrap {
      position: relative;
      max-width: 560px;
      margin: 0 auto;
    }
    .word-input {
      width: 100%;
      font-family: var(--font-serif);
      font-size: clamp(1.7rem, 3.6vw, 2.4rem);
      font-weight: 500;
      letter-spacing: -0.005em;
      text-align: center;
      padding: 14px 20px 20px;
      border: 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      border-bottom: 2.5px solid var(--line-strong);
      transition: border-color var(--dur) var(--ease-out);
    }
    .word-input::placeholder { color: var(--subtle); font-style: italic; }
    .word-input:focus { border-bottom-color: var(--brand); }
    .session .word-input-wrap:focus-within::after {
      content: "";
      position: absolute; left: 0; right: 0; bottom: -2.5px;
      height: 3px; background: var(--brand);
      transform-origin: left;
      animation: underline-in var(--dur-slow) var(--ease-out);
    }
    @keyframes underline-in { from { transform: scaleX(0); } to { transform: scaleX(1); } }

    .audio-row {
      display: flex; justify-content: center; gap: 10px;
      margin-top: 20px;
    }
    .action-row {
      display: flex; justify-content: center; gap: 10px;
      margin-top: 26px;
      flex-wrap: wrap;
    }
    .phase-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      font-size: 0.78rem; font-weight: 800; letter-spacing: 0.04em;
      background: var(--panel-soft); border: 1px solid var(--line);
      color: var(--ink-2);
    }
    .phase-badge.learning { background: color-mix(in oklab, var(--brand) 10%, var(--panel)); color: var(--brand-ink); border-color: color-mix(in oklab, var(--brand) 30%, transparent); }
    .phase-badge.final { background: var(--warn-soft); color: var(--warn-strong); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
    .phase-badge.test { background: color-mix(in oklab, var(--ink) 10%, var(--panel)); color: var(--ink); border-color: var(--line-strong); }

    .session-footer {
      margin-top: 28px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .keys-hint { color: var(--subtle); font-size: 0.82rem; font-weight: 600; }
    .keys-hint kbd {
      display: inline-block; padding: 1px 6px; border-radius: 5px;
      background: var(--panel-soft); border: 1px solid var(--line);
      font-family: var(--font-mono); font-size: 0.74rem;
      margin: 0 2px;
      color: var(--ink-2);
    }

    /* Companion dock during session: sits at the top-left of the prompt-card
       like a book-plate / illuminated initial. Anchored to .session (top +
       session-head height) so it stays put when ribbon / family chips grow
       the card.
       Values assume .session-head ≈ 28px + 10px margin-bottom = 38px from top. */
    .companion-dock {
      position: absolute;
      left: -8px;
      top: 60px;
      width: 84px; height: 84px;
      pointer-events: none;
      z-index: 2;
    }
    .companion-dock img {
      width: 100%; height: auto;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,0.18));
      animation: companion-float 6s ease-in-out infinite;
    }

    /* ==========================================================
       NEW: Feedback ribbons (inline, non-destructive)
       ========================================================== */
    .ribbon {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      animation: ribbon-in var(--dur-slow) var(--ease-out);
    }
    @keyframes ribbon-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ribbon.good {
      background: var(--good-soft);
      border-color: color-mix(in oklab, var(--good) 30%, transparent);
      color: var(--good-strong);
    }
    .ribbon.warn {
      background: var(--warn-soft);
      border-color: color-mix(in oklab, var(--warn) 30%, transparent);
      color: var(--warn-strong);
    }
    .ribbon.bad {
      background: var(--bad-soft);
      border-color: color-mix(in oklab, var(--bad) 30%, transparent);
      color: var(--bad-strong);
    }
    .ribbon-ic {
      width: 36px; height: 36px; border-radius: 999px;
      display: grid; place-items: center;
      background: rgba(255,255,255,0.55);
      font-weight: 800; font-size: 1.2rem;
    }
    .ribbon-body b {
      font-family: var(--font-serif); font-weight: 500;
      font-size: 1.15rem; letter-spacing: -0.01em;
    }
    .ribbon-body .word {
      font-family: var(--font-serif); font-weight: 500;
      font-size: 1.3rem; margin-left: 4px; letter-spacing: -0.01em;
    }
    .ribbon-body .sub {
      font-size: 0.88rem; margin-top: 2px; color: inherit; opacity: 0.85;
    }

    .family-chips {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 14px; padding-left: 4px;
    }
    .family-chips .flabel { font-size: 0.76rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); align-self: center; }
    .fchip {
      padding: 5px 12px; border-radius: 999px;
      background: var(--panel-soft); border: 1px solid var(--line);
      font-family: var(--font-serif);
      font-size: 1.02rem; font-weight: 500; letter-spacing: -0.005em;
      color: var(--ink);
    }

    /* ==========================================================
       NEW: Summary (page complete)
       ========================================================== */
    .page-complete {
      max-width: 820px; margin: 0 auto;
      padding: 44px 42px 36px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-warm);
      position: relative;
    }
    .page-complete::before,
    .page-complete::after {
      content: "";
      position: absolute;
      left: 32px; right: 32px;
      height: 1px;
      background: color-mix(in oklab, var(--line-strong) 55%, transparent);
    }
    .page-complete::before { top: 18px; }
    .page-complete::after { bottom: 28px; }
    .pc-head {
      display: flex; gap: 18px; align-items: center;
    }
    .pc-head .pc-seal {
      width: 76px; height: 76px; border-radius: 50%;
      background: var(--good-soft);
      display: grid; place-items: center;
      font-family: var(--font-serif); font-weight: 500; font-size: 2.4rem;
      color: var(--good-strong);
    }
    .pc-headline {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 3.6vw, 2.6rem);
      line-height: 1.0;
      letter-spacing: -0.025em;
      font-weight: 500;
      margin: 0;
    }
    .pc-meta { color: var(--muted); font-size: 0.92rem; margin-top: 4px; }
    .pc-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }
    .pc-stat {
      padding: 16px;
      background: var(--panel-soft);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
    }
    .pc-stat .v {
      font-family: var(--font-serif);
      font-size: 2rem; font-weight: 500; letter-spacing: -0.015em;
      line-height: 1;
    }
    .pc-stat .l {
      font-size: 0.8rem; font-weight: 700; color: var(--muted);
      letter-spacing: 0.04em; text-transform: uppercase; margin-top: 4px;
    }
    .pc-drill {
      margin-top: 24px;
      padding: 18px 20px;
      background: color-mix(in oklab, var(--warn-soft) 70%, var(--panel));
      border: 1px solid color-mix(in oklab, var(--warn) 26%, transparent);
      border-radius: var(--radius);
    }
    .pc-drill h4 {
      font-family: var(--font-serif); font-size: 1.15rem; font-weight: 500; margin: 0 0 8px; letter-spacing: -0.01em;
    }
    .pc-drill-chips {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }

    .pc-companion {
      margin-top: 24px;
      padding: 18px 20px;
      background: linear-gradient(135deg, var(--inklet-soft), var(--panel));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 16px;
      align-items: center;
    }
    .pc-companion img { width: 80px; height: auto; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.15)); }
    .pc-companion-body b { font-family: var(--font-serif); font-weight: 500; font-size: 1.1rem; letter-spacing: -0.005em; }

    .pc-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center;
      margin-top: 28px;
    }

    /* ==========================================================
       NEW: Toasts + celebrations
       ========================================================== */
    .toast-shelf {
      position: absolute;
      right: 24px; bottom: 24px;
      z-index: 40;
      display: flex; flex-direction: column; gap: 12px;
      pointer-events: none;
    }
    .toast-catch {
      pointer-events: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 12px 16px 12px 12px;
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      align-items: center;
      max-width: 320px;
      animation: catch-slide-in var(--dur-slower) var(--ease-out);
    }
    @keyframes catch-slide-in {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .toast-catch .cm-port {
      width: 56px; height: 56px; border-radius: 14px;
      background: radial-gradient(closest-side, var(--inklet-soft), var(--panel-soft));
      display: grid; place-items: center; overflow: hidden;
    }
    .toast-catch .cm-port img { width: 52px; }
    .toast-catch .cm-title { font-family: var(--font-serif); font-size: 1.02rem; letter-spacing: -0.005em; font-weight: 500; }
    .toast-catch .cm-body { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

    .celeb-modal {
      position: absolute;
      inset: 0;
      background: radial-gradient(closest-side, color-mix(in oklab, var(--inklet) 32%, #000) 0%, rgba(0,0,0,0.78) 100%);
      display: grid;
      place-items: center;
      z-index: 50;
      animation: celeb-in 520ms var(--ease-out);
    }
    @keyframes celeb-in { from { opacity: 0; } to { opacity: 1; } }
    .celeb-card {
      text-align: center;
      padding: 36px 40px;
      position: relative;
    }
    .celeb-mon {
      width: 260px; height: 260px;
      margin: 0 auto;
      animation: celeb-rise 1.2s var(--ease-out);
    }
    @keyframes celeb-rise {
      from { opacity: 0; transform: translateY(40px) scale(0.8); filter: blur(6px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    .celeb-title {
      font-family: var(--font-serif); font-weight: 500;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -0.02em;
      color: white;
      margin: 18px 0 6px;
    }
    .celeb-sub {
      color: rgba(255,255,255,0.85);
      font-size: 1.02rem;
    }
    .celeb-ring {
      position: absolute; left: 50%; top: 40%;
      transform: translate(-50%, -50%);
      width: 360px; height: 360px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 80px 8px color-mix(in oklab, var(--inklet) 40%, transparent);
      animation: celeb-ring 1.6s var(--ease-out) infinite;
    }
    @keyframes celeb-ring {
      0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
    }

    /* ==========================================================
       Top nav (product-level)
       ========================================================== */
    .topnav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 4px 22px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-serif); font-weight: 500;
      font-size: 1.2rem; letter-spacing: -0.015em;
    }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--inklet), var(--glimmer));
      color: white;
      display: grid; place-items: center;
      font-family: var(--font-serif); font-weight: 500;
      font-size: 1.06rem;
      box-shadow: var(--shadow-xs);
    }
    .brand .lockup small { display: block; color: var(--muted); font-family: var(--font-sans); font-weight: 600; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .learner-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 12px 4px 4px;
      border: 1px solid var(--line); border-radius: 999px;
      background: var(--panel-soft);
      cursor: pointer;
      font-weight: 700; font-size: 0.9rem;
    }
    .learner-pill .lp-av {
      width: 32px; height: 32px; border-radius: 999px;
      background: radial-gradient(closest-side, var(--inklet-soft), var(--panel)); overflow: hidden;
      display: grid; place-items: center;
    }
    .learner-pill .lp-av img { width: 30px; }

    .theme-btn {
      appearance: none; border: 1px solid var(--line); background: var(--panel-soft);
      width: 40px; height: 40px; border-radius: 999px;
      display: grid; place-items: center; cursor: pointer;
      color: var(--ink-2);
    }

    /* ==========================================================
       Mobile tweaks
       ========================================================== */
    .device-frame.mobile .hero-row,
    .device-frame.mobile .subject-grid,
    .device-frame.mobile .codex-rail,
    .device-frame.mobile .setup-grid,
    .device-frame.mobile .mode-row,
    .device-frame.mobile .pc-stats {
      grid-template-columns: 1fr !important;
    }
    .device-frame.mobile .pc-stats { grid-template-columns: repeat(2, 1fr) !important; }
    .device-frame.mobile .hero-paper { padding: 28px 22px 22px; min-height: 460px; }
    .device-frame.mobile .hero-mission { max-width: 100%; }
    .device-frame.mobile .companion-stage { height: 200px; }
    .device-frame.mobile .companion-img { width: 160px; }
    .device-frame.mobile .prompt-card { padding: 28px 20px 22px; }
    .device-frame.mobile .topnav { padding: 10px 0 16px; }
    .device-frame.mobile .setup-main { padding: 22px 20px; }
    .device-frame.mobile .page-complete { padding: 30px 22px 26px; }

    @media (max-width: 820px) {
      .design-shell { grid-template-columns: 1fr; }
      .design-rail {
        position: static; height: auto;
        flex-direction: row; overflow-x: auto; gap: 4px; padding: 12px;
        border-right: 0; border-bottom: 1px solid var(--line);
      }
      .rail-item { flex-shrink: 0; }
      .design-rail .rail-group, .design-rail h2, .design-rail .eyebrow { display: none; }
    }

    /* Screenshot note: the design reasoning block is collapsible */
    .brief {
      max-width: 1240px; margin: 0 auto 20px;
      padding: 22px 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xs);
    }
    .brief summary {
      cursor: pointer;
      font-family: var(--font-serif); font-weight: 500;
      font-size: 1.2rem; letter-spacing: -0.01em;
      list-style: none;
    }
    .brief summary::-webkit-details-marker { display: none; }
    .brief summary::after {
      content: "▾"; float: right; color: var(--muted); transition: transform var(--dur) var(--ease-out);
    }
    .brief[open] summary::after { transform: rotate(180deg); }
    .brief p { color: var(--ink-2); line-height: 1.55; }
    .brief ul { color: var(--ink-2); line-height: 1.55; padding-left: 1.2em; }
    .brief li + li { margin-top: 4px; }
    .brief h4 {
      font-family: var(--font-serif); font-size: 1.05rem; font-weight: 500;
      letter-spacing: -0.005em;
      margin: 16px 0 6px;
    }

  </style>
</head>

  <div id="root"></div>

  <!-- React 18.3.1 pinned with integrity -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components (shared primitives); exports to window -->
  <script type="text/babel" src="./v1/components.jsx"></script>
  <!-- Scenes; exports to window -->
  <script type="text/babel" src="./v1/scenes.jsx"></script>
  <!-- App; renders -->
  <script type="text/babel" src="./v1/app.jsx"></script>
</body>
</html>
