# SH2-U11: client-bundle audit on every PR.
#
# Plan: docs/plans/2026-04-26-001-feat-sys-hardening-p2-plan.md (lines 747-799, R11).
#
# Runs `npm run audit:client` (invokes `scripts/audit-client-bundle.mjs`)
# on every PR to catch forbidden imports / production-only leaks before
# the build / deploy path sees them.
#
# Security posture (deepening S-02):
#  - `permissions: contents: read` only.
#  - NO `CLOUDFLARE_API_TOKEN` / `CF_*` environment variables — this
#    workflow only exercises the static audit, which needs no secrets.

name: Client Bundle Audit (PR)

on:
  pull_request:
  # Reviewer NIT-A3 (cli-agent #3): `workflow_dispatch` so a maintainer
  # can re-run the audit without pushing a new commit (e.g. after an
  # upstream dependency issue is transient).
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm run audit:client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Reviewer BLOCKER-1 fix (ce-correctness): `scripts/audit-client-bundle.mjs`
      # reads `src/bundles/app.bundle.js`, which is `.gitignore`d (line 12)
      # and therefore absent in a fresh CI checkout. Without a build step
      # the audit hits ENOENT on every PR. Mirror the chain used by
      # `wrangler.jsonc:20` — `npm run build && npm run audit:client` — so
      # CI matches the Cloudflare remote-build contract.
      - name: Build bundles
        run: npm run build

      - name: Run client-bundle audit
        # Hard PR gate since PR #320 landed the seeded-default pattern that removed
        # the static spelling dataset imports from src/subjects/spelling/events.js.
        # Any PR that reintroduces a heavy dataset import into the client bundle
        # will fail this step rather than warn in the log.
        run: npm run audit:client
